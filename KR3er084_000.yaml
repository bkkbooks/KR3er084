body:
  text: 序夫醫者意也切脈察色聽聲審形要在推吾意與受病者兩相印而無疑而後其陰陽榮衛始克就吾之調劑而各當譬則射者必有彀率其中非爾力也亦如醫之以意中也上世岐黃倉扁無論其在中古所流傳者獨丹溪仲景得其解而所著述迄今垂不朽近代以來質愚下士爭冒醫名以殫人財而究則不殞人之命不止其於彀之藩籬且大有徑庭矣太醫雲林龔君少則精其業居大梁之都名燁燁在諸薦紳間所撰有古今醫鑑萬病回春二書已膾炙海內而最後有神彀若干卷遠近兢慕而繕寫之至湧洛陽之價其姻對峰周君圖付剞厥而丐敘於不佞不佞家苕逴去龔君霅遠即未親沾藥石而往歲得二書便取方之資真晉人所稱千里神交也者茲覽是書方脈幼科以至內府祕方種種收録而尤系之歌訣能令誦習者愈心快目尤遠出前二書上久矣龔君詎非神於醫彀而不為大言無當哉異時計君用是書取效當世必且如由基之矯矢而猿號蒲且之縈繳而鳧下寰宇賢愚咸受不報之賜而其書世世不朽又寧在丹溪仲景下也對峰君曰然請書之用為左卷時萬曆辛卯春月吉歸安鹿門山人茅坤撰
