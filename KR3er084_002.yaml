枳實隨已上等分甘減半燈草煎來不用疑七味五疸濕熱遍身發黃清利水道便是良方茵陳散里茯豬苓梔子黃連枳實並蒼朮厚朴白滑石澤瀉燈草水煎靈十味腎疸目黃身黃尿赤所用風藥風能勝濕腎疸湯中羌獨活藁木升麻防風葛神麯甘草楝人參黃柏蒼朮四苓合十六味濕熱發黃汗黃尿赤利水除濕清熱可已茯苓滲濕用豬苓芩連梔子與茵陳木通防己並澤瀉枳實陳皮蒼朮真痼冷痼冷寒之甚四肢作厥逆腹痛冷汗出陰囊忽縮入身靜語無聲氣少難喘息目睛不了了口鼻冷氣襲大小便不禁水漿不肯吸面寒如刀刮先要用蔥尉急將熱藥投百中無一失加味理中大附子人參白朮乾薑使肉桂陳皮白茯苓棗薑甘草痛立止八味固陽湯內用參耆白朮乾薑厚朴齊白薑腹痛良薑倍茯苓大附獨稱奇九味回春散治冷陰如神一錢白礬八分丹二分胡椒細細研焰消一分共四味釅醋調和手內攤男左女右合陰處渾身是汗濕衣衫此方屢用如神效不義之人不可傳灸男左手右手中指一壯再灸臍下三寸名關元穴七壯斑疹凡斑即出須得脈洪數有力身溫手足溫者易治若脈沉小足冷元氣虛弱者難治凡斑疹先從四肢起而後入腹中者死發斑紅赤為熱若紫不赤為熱甚若還紫黑為胃爛赤斑半生半死症黑斑九死一個生大抵鮮紅稀即靜升麻葛根湯方見傷寒人參化斑一錢參石膏知母各三錢甘草五分米一撮水煎一劑即安然四味發熱傷寒發熱者寒邪傷於衛脈來緊有力此是外感致九味羌活湯方見傷寒傷暑發熱者熱邪傷於榮脈虛遲無力暑傷元氣明清暑益氣湯方見中暑內傷發熱者陽氣自損傷此病屬脾肺脈大無力量補中益氣湯方見內傷陰虛發熱者陰血自損傷此病屬心腎脈數無力殃滋陰降火湯方見虛勞夜間則身靜晝上即發熱此熱在氣分清涼藥可啜小柴胡湯方見傷寒依本方加梔子黃連知母地骨皮晝上則身靜夜間即發熱此熱在血分滋陰火自滅四物湯方見補益依本方加知母黃柏黃連梔子牡丹皮柴胡不分晝與夜一般只發熱熱在氣血分清補是明哲四物湯合小柴胡湯加黃連梔子子午潮熱者此是坎離虛降火與滋水標本兼濟之逍遙散方見婦人依本方加黃連胡黃連麥門冬地骨皮秦艽木通車前燈草發熱憎寒者邪在半表裡分利陰與陽寒熱病自愈小柴胡湯合五苓散諸虛脈大無力是氣虛脈數無力是血虛氣虛脾肺弱面黃肌瘦消胸痞食不思諸病相兼作四君子湯用人參白朮茯苓甘草兼能醫氣分諸虛症王道之醫在此間四味血虛心腎虧日晡發寒熱煩躁不安寧百病來相挾四物湯內用當歸川芎白芍地黃宜能醫血分諸虛症應變隨機莫執泥四味氣血兩虛損肝腎傷根本此藥可調和用之最平穩八珍湯即四君子湯合四物湯是也萬病總歸虛三方損益施玄機能勘破再世一盧醫十全大補湯即八珍湯加黃耆肉桂十味是也補中益氣湯方見內傷六味地黃用八兩山藥石棗共半斤茯苓牡丹同澤瀉各稱三兩要均勻為末為丸梧子大百丸酒下用空心思傷心血欲損肝氣心腎不交水火不濟大補諸虛平和之劑神仙既濟丹巴戟蓯蓉石菖蒲遠志牛膝杜仲小茴香菟絲石棗甘枸杞山藥人參五味子黃柏知母生熟地麥門茯苓甘菊花陳皮梔子研末制棗肉蜜丸梧子大空心百丸酒下去二十二味五勞七傷諸虛百損男子精憊有傷根本婦人虛冷經候不準延齡固本生熟黃天麥杜膝茯參香巴山杞棗柏五味各稱二兩要精詳菖志覆車蓉澤菟地骨川椒兩半強酒糊為丸仍酒下每服空心五十雙如婦人加當歸身酒洗赤石脂各一兩上共二十六味養心益腎百補丸方見後雜方治諸虛百損補養第一真仙方也珍之重之虛勞骨蒸勞熱脈數而虛熱而澀小必損其軀加汗加咳非藥可除房勞太過度心腎有虧損熱嗽喘血痰相火動因忿降火要滋陰治標當固本陰虛火動骨蒸熱壯盛童便要清潔連進數服熱勢減加入湯藥一同啜滋陰降火芍當歸白朮陳皮甘草隨天麥門冬生熟地黃柏知母補陰虛十味清離滋坎湯山藥生熟天麥茯歸芍牡丹澤瀉術山茱黃柏知母甘草著十五味六味地黃丸方見諸虛加紫河車其治虛勞之聖藥也清痰降火滋陰化源潤肺補腎培其本根滋陰清化生熟黃天麥門冬二兩強苓芍知玄山枸杞薏苡一兩各稱量黃柏酒炒一兩半甘草五錢生用良五味七錢同研末蜜丸彈子咽津嘗十四味白雪干糕美滋味大米糯米各升許蓮肉芡實山藥炒各稱四兩要研細白砂糖用一斤半攪勻籠內蒸成劑虛勞泄瀉並內傷脾胃虧損當飲食六味勞瘵之源根深固蒂起非一朝病非一夕醫難一方藥難一劑房室要絶惱怒要去妄想要息厚味要忌要求明醫莫惜所費調攝經年沉疴可愈吐血大凡失血脈貴沉細説見洪大後必難治大抵失血俱屬熱陽盛陰虛妄行血紫黑成塊清除之新鮮紅血當止塞若有死血在胃口吐不盡時成血結諸失血後宜調之補榮湯中真妙絶吐血出於胃吐出全是血清熱引歸經熱除血自歇止血生地八兩數搗汁童便重湯煮大黃生末五六分空心調服一盞許三味吐血成鬥許管仲末二錢柏葉汁一碗發灰五分全共入重湯煮取出入童便黃酒加少許頻頻入口吞犀角地黃湯最良牡丹赤芍四般藏衄血與吐同涼血能除諸熱不須詳四味再加黃連黃芩殊效先起只吐痰末後方見血漫説與醫人此症是積熱清肺湯用芎當歸天麥梔芩桑白皮生地茯陳甘紫菀阿膠烏梅共㕮咀十四味先間見吐血後見覆吐痰如此是何症陰虛火上炎滋陰降火湯方見虛勞六味地黃湯方見諸虛調理之劑吐血衄血並嘔吐咯血痰血及唾血後用此方調理之大補榮中清客熱補榮湯中生熟地當歸白芍草山梔人參麥門茯苓等陳皮烏梅棗子宜十味衄血鼻衄吐血沉細宜忽然浮大即頃危衄血出於鼻火熱來克肺清火與滋陰服之血自止清肺湯中歸芍地香附芩連梔子是赤芍桔梗生甘草藕節柏葉一同類十二味三仙飲子治衄血人乳童便好酒竭三味等分重湯煮溫服一碗立可截鼻衄久不止大紙作十褶水溫置頂中尉之加神捷鼻衄久不止蘿蔔子然計無灰黃酒和飲之效可立鼻衄久不止馬驢糞焙末血餘灰等分少許吹鼻過鼻衄久不止大蒜搗如泥左鼻若出血左腳心下塗右鼻若出血右腳心下敷兩鼻俱出血兩足心內鋪咳血咳血咳嗽出痰中帶血物此症肺經來醫人休恍惚清咳湯中用貝母歸芍桃仁山梔子桔梗黃芩牡丹皮白朮青皮甘草煮十一味潮熱加柴胡赤茯苓咯血咯血出於腎咯出俱血屑清火豁痰涎服之保安吉清咯湯中有二陳知母貝母山梔仁生地阿膠桑椹子桔梗柳桂效通神十三味唾血唾血出於腎鮮血隨唾出降火補陰虛其血自消沒清唾湯中天麥門知母貝母黑玄參桔梗遠志乾薑炒熟地黃柏可加添十味溺血溺血小便出心熱移小腸清心利水道只此是良方清腸萹蓄並瞿麥歸芍生地梔連柏木通知母麥門冬茯苓甘草皆可得十三味蒲黃散用炒山梔通草滑石與當歸藕節生黃並小薊甘草竹葉總相宜十味便血便血大便出濕熱蘊臟腑不問糞後前服之可救苦清臟湯中芎芍歸生地芩連梔柏榆槐花阿膠側柏葉大便下血總堪醫十二味枳殼散黃連槐花地榆全白芍並甘草空心用水煎六味一方加當歸生地黃防風亦效腸風下血腸風下血者必然在糞前是名為近血清熱免憂煎烏金散柏葉白礬煮陳棕二兩燒槐花用四兩十分休炒焦每服二錢半空心用酒調腸風崩漏痔一服立時消柏葉湯中用地榆槐花荊芥與芎歸生地黃連炙甘草烏梅枳殼緊相隨十味腸風下血荸薺紅棗水煮一斤食之即好腸風下血絲爪根經霜露過三五錢水煎入油如錢大空心一服斷根源臟毒下血臟毒下血者必然在糞後是名為遠血解毒方為妙解毒一名八寶湯黃芩黃連黃柏良梔子連翹槐花等細辛甘草共煎嘗八味臟寒下血臟寒下血無痛脈微陽虛陰走溫則是宜理中湯方見中寒並薑桂之類積熱下血積熱下血甚則兼痛脈來洪數解毒堪用三黃丸大黃黃連黃芩良等分研細末水丸茶下涼人參敗毒散方見傷寒加黃連如酒毒下血黃連用巴豆同炒去巴豆不用余方附後腸風臟毒腸澼血乾柿燒灰存性研空心米飲調二錢不拘新久如神捷腸風臟毒痔便血黃連酒炒四兩切入在豬臟兩頭扎韭菜二斤水同煎服藥搗爛丸不折空心每服八十丸米湯送下宜溫熱盜汗盜汗屬陰虛每向睡中出若還醒則止血虛非鬼祟當歸大黃生熟地黃芩黃連黃柏宜黃耆加倍各等分水煎一服有神奇七味當歸地黃用生熟芍耆陳草參苓朮知母黃柏蜜水炒滋補氣血汗自沒十二味自汗謂不經發汗自出者是也忌用生薑自汗屬陽虛不拘時常出須當補氣虛汗出如油卒參耆湯里有當歸白朮茯苓熟地宜酸棗烏梅甘白芍再加牡蠣與陳皮十一味男子失精女人夢遺盜汗自汗宜實腠理白龍湯中用桂枝牡蠣龍骨煅為奇白芍酒炒甘草炙二枚棗子共煎之五味文蛤散即五倍子為末津調臍內使絹帛繫縛過一霄自汗盜汗俱可止眩暈肝脈溢大多眩暈諸風掉眩皆屬於肝眩者言其黑暈者是旋轉皆屬虛與痰治法當分辨清眩化痰湯茯苓陳皮半夏草南星川芎白芷防羌活細辛枳實酒黃芩十二味肥人頭眩暈氣虛有濕痰除濕清痰氣補氣病自安四君子湯加天麻半夏陳皮白芷賒蜜炒黃耆白桔梗當歸川芎莫要差十三味瘦人頭眩暈血虛有痰火清火化痰涎養血即安可四物湯中加陳皮片芩去朽小山梔茯苓天麻各等分甘草人參減半之十二味忽然眩暈倒必定是風痰其脈多浮滑祛風化痰涎加減二陳去半夏人參枳朮與南星羌活防風瓜蔞子芎歸桔梗好相應十味勞役人眩暈飢飽傷中氣六脈皆虛微補養真良劑補中益氣湯方見內傷依本方加半夏熟地黃白芍天麻陰虛火動人頭目多眩暈六脈加數時降火滋心腎滋陰降火湯方見虛勞依本方加川芎天麻山梔竹瀝少許氣虛極欲倒如坐舟車上手足時厥冷脈細是其恙參附湯即人參五錢大附子炮三錢生薑煎服頭眩眼黑暗如在風雲中此中胃氣損停痰濕在胸半夏白朮天麻湯方見頭痛加減十全大補湯方見諸虛治眩暈如神麻木渾身麻乃是氣虛氣血虛損麻四肢本是濕痰並死血麻痹氣鬱經絡滯渾身麻木乃屬氣虛補中益氣開鬱兼施加味益氣加桂枝木香香附子青皮更有川芎薑棗煮大補真元正氣虛十一味手足麻木屬氣血虛大補氣血風藥引之加味八仙用柴胡羌活防風牛膝咀陳皮桂枝薑半夏秦艽再入薑棗扶十六味八仙即八物湯是也本是濕痰或是死血活血化痰兩般是法雙合湯中芎歸芍陳皮半夏茯苓著桃仁紅花白芥子生地甘草生薑佐十一味手足麻痹氣滯經絡開結舒經氣血通活開結舒經蘇桂枝臺烏香附草陳皮羌活天南星半夏川芎蒼朮和當歸十二味手足麻痹身肉如癡痛癢不覺爬如隔衣久成風厲血滯氣虛天麻地膚芎歸參鮮皮防己威靈仙羌獨桂牡草烏炮生地紅花苦參然水煎入酒和童便戒房除味保安全十六味癲狂癲是心經血不足喜笑不常顛倒事脈搏大滑者為生沉小緊急多不治養血清心湯遠志人參白朮並生地茯苓川芎酸棗仁菖蒲當歸甘草類十味寧志化痰牛膽星半夏陳皮白茯苓黃連天麻酸棗炒菖蒲人參用最靈九味狂為痰火實大盛狂亂動止無正定熱狂脈實大者生沉小決定傷生命防風通聖散方見中風依本方加牡丹皮生地黃桃仁獨參丸治發狂邪殺人大叫亂交加苦參蜜丸梧子大薄荷湯下甘丸佳婦人患癲喜歌唱亂走逾垣把屋上營血迷於心包絡致生怪症難形狀加味逍遙加遠志桃仁紅花並生地有熱加入小柴胡再把辰砂末調劑十味癇病脈虛弦為驚為風癇癇病身軟即暈倒痰涎壅並人不曉咬牙吐痰片時間蘇醒過來如舊好加味二陳加南星枳實桔梗並黃芩瓜蔞木香山梔子辰砂為末旋加臨十味加減壽南星半夏荊防皂角與天麻青皮細辛四苓散茯神香附子為佳十四味追風半夏用六兩薑礬皂水浸三朝南星三兩制同上防附蠶麻二兩饒香蠍枯礬各半兩牙皂一兩炒休焦薑糊丸似梧子大七錢硃砂為衣標食後臨臥七十粒薑湯送下病當瘳健忘健忘作事無終始言發不知首與尾思慮過度損心脾痰迷心竅亦如是歸脾湯里用參耆茯苓白朮並當歸遠志酸棗龍眼肉木香甘草補心脾十味補心湯用芍參歸術苓知母草陳皮生地黃柏石菖蒲麥門酸棗仁遠志十四味人若多忘事遠志茯菖蒲每日煎湯服心通萬卷書三味六味地黃丸方見補益治健忘怔忡驚悸不寐加遠志肉石菖蒲人參白茯神當歸酸棗仁炒各二錢寧心保神益血固精壯力強志定魄鎮驚怔忡健忘痰火能清天王補心用茯參桔志玄丹各五錢生地二兩用酒洗天麥酸味柏歸連各稱一兩研為末蜜丸硃砂作衣穿臨臥每服二三十燈心竹葉煮湯吞十四味怔忡大凡思慮即心跳此是心經血虛兆心若時跳又時止痰因火動治痰妙若有思慮即便心跳此是血虛養血為妙四物安神生熟地歸芍參連梔茯是竹茹白朮麥門冬辰砂酸棗烏梅類十四味心若時跳又復時止痰因火動治之立愈加味二陳加枳實麥門竹茹並白朮黃連梔子炒人參當歸烏梅辰砂末十四味奇效硃砂安神丸黃連酒洗六錢先炙草當歸二錢半錢半生地一同研蒸餅為丸黍米大五錢硃砂作衣穿每服不拘三五十低頭仰臥用津咽五味驚悸心中驚悸脈必代結飲食之悸沉伏動滑驚悸忽驚惕心中而不安養血以清火溫膽兼化痰驚悸不安血虛火動養血清火安神可用養血安神酸棗仁芎歸生地白茯神白朮柏子陳皮芍黃連甘草炙之靈十一味驚悸不安氣虛痰火養氣化痰療之立可加減溫膽參茯神歸連枳半麥梔仁生黃酸棗辰砂末竹茹白朮甘草尋十四味鎮驚兩半生地黃麥門白芍茯陳當貝母各宜稱一兩川芎遠志七錢強黃連酸棗五錢炒三錢甘草共研良蜜丸硃砂為衣服七十臨眠用棗湯十三味虛煩心煩不得眠心內熱相煎虛煩不得臥心怯膽虛寒加味溫膽二陳湯五味人參熟地黃竹茹遠志甘草煮枳實酸棗棗生薑十一味竹葉石膏湯方見傷寒治大病後表裡俱虛內無津液煩渴心躁及諸虛煩熱與傷寒相似但不惡寒身不疼痛不可汗下宜服之不寐不寐心膽怯晝夜不得睡心經氣不足痰涎沃心內高枕無憂散麥冬陳皮半夏茯苓同竹茹枳實人參草石膏龍眼共效功十味酸棗仁湯參茯苓等分煎服不相同如不要睡即熱服要睡冷服有奇功三味溫膽湯方見傷寒治大病後虛煩不得眠此膽寒也依本方六味加人參酸棗仁炒茯神遠志安神伏睡湯四物益智良酸棗遠志肉山藥圓眼方九味邪祟脈乍大乍小乍長乍短此皆邪脈神志昏亂灸鬼秦承祖驚狂譫妄語上屋更逾垣親疏罵不避麻繩繫縛定兩手大拇指介甲兩指角四處著火起一連灸七壯須臾病即愈
