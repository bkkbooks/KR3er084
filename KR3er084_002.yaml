body:
  text: 卷二瘧疾脈弦數多熱弦遲多寒脈弦數滑實皆順沉細虛微為逆瘧是風寒與暑濕內傷勞倦並飲食發寒發熱作口乾無痰決不成瘧疾大凡瘧初起散邪正氣先無汗要有汗散邪藥可煎有汗要無汗正氣病當痊無汗要有汗散邪為主散邪湯內用麻黃川芎白芷芍蘇羌防風荊芥同甘草瘧疾初投此藥良九味有汗要無汗正氣為主正氣湯中用桂枝柴前芎芷牛青皮麥門檳果苓甘草瘧疾元虛總可醫十二味瘧疾發寒熱口汗併發渴半表半裡證陰陽要分別柴苓湯即小柴胡湯方見傷寒五苓散方見中暑二方相合是也熱瘧火盛舌卷焦黑陽春而深脈洪而數龍虎湯中用柴苓半夏石膏山梔仁黃連知母並黃柏糯米生薑總可任九味先以青布招疊數重新汲水漬之搭於胸上三次熱勢稍定即服此藥寒瘧冷甚寒多熱少陰毒而深脈虛而小雞鳴酒內用常山藿香肉桂茯苓參甘草烏梅黃酒煮空心熱服病當痊七味瘧疾人壯盛用藥可單截不拘新與久一服如神捷不二飲內用檳榔常山知母貝母良等分酒煎露一宿五更溫服見神方四味煎此藥勿犯婦人手又不宜太煎過了虛人患瘧疾養正邪自除暴瘧與初起投之病可蘇人參養胃茯陳皮半夏厚朴藿芎歸蒼朮烏梅甘草果薑棗同煎病自除十二味瘧疾治已後血氣須調養日久成虛疾噬臍枉追想參歸養榮地黃芍砂陳苓木甘山藥厚朴蓮肉炙甘草薑棗烏梅用一個十一味腹中有一塊是名為瘧母日久恐不消多有成脹滿參歸鱉甲術苓耆砂仁芎朴草青皮香附山楂並枳實烏梅薑棗水煎之十四味補中益氣湯治內傷元氣虛弱瘧疾寒熱久不愈者宜服方見內傷十全大補湯治久瘧不愈血氣虛損屬虛寒者宜服方見諸虛加大附子痢疾脈宜微細忌洪大身宜涼不宜熱痢疾不分赤與白俱作溫熱治可得初起壯盛先宜通久痢虛弱當調塞壯盛人初痢利之去積滯濕熱一清除痢疾斯已矣玄白散內用牽牛赤芍生黃歸去頭檳榔枳殼煨莪朮大黃黃連可解愁九味虛弱人初痢濕熱傷血氣消之滯自除不必多通利芍藥湯中用木香芩連枳殼與檳榔當歸甘草水煎服一劑令君病體康八味立效四兩淨黃連二兩吳茱共酒眠炒乾去吳茱不用麩抄枳殼二兩全為末三錢空肚服瀉腸痢酒立安痊下痢稍久調和氣血稍加升提痢自止歇紅痢宜調和飲內芍芎歸升麻桃仁研去皮黃連黃芩各等分臨時加減始為奇七味白痢宜調中理氣蒼厚朴陳皮白朮木香芍更有枳殼與檳榔紅痢再加芩連佐八味參歸芍藥白茯苓白朮山藥與砂仁甘草陳皮加減用蓮肉烏梅燈草並九味久痢滑脫宜兜澀之大補氣血兼以升提真人養臟粟殼參訶子當歸肉蔻真白朮木香並芍藥乾薑肉桂不須尋十味疫痢赤白憎寒壯熱腹痛後重噤口不食倉稟散即人參敗毒散方見傷寒加黃連陳倉米石蓮肉白芍薑棗煎服如噤口用田螺搗爛合臍上引熱下行即能食噤口痢是胃口熱黃連人參減半切煎湯終日細呷之加上石蓮為妙絶二味痢疾噤口用石蓮研末每服二三錢陳倉米湯調勺服嘔加薑汁立時痊一切噤口赤白痢黃連生薑四兩制生薑搗爛同連炒炒乾去薑連研細倉米飯丸每二錢白痢陳皮湯送去赤痢甘草可煎湯赤白陳皮甘草是脾泄臘茶清可吞妙方留下君須記泄瀉足太陰脾經脈緩時微小者生浮大數者死泄而脘脹脈弦者死泄瀉清濁兩不分只固濕多五瀉成陰陽分利瀉自止健脾燥濕可安平胃苓湯內倉陳朴豬苓澤瀉茯苓芍白朮肉桂甘草煎諸般泄瀉皆可卻十味止瀉七錢豬茯陳一兩炒術五錢參官桂一錢炙草二棗丸水化服之靈七味名一苓丸寒瀉脈沉遲悠悠腹中時瀉下無休止溫藥理中宜理中湯內加官桂藿香良薑廣陳皮茯苓烏梅用一個薑棗燈心煎服之十味火瀉六脈數痛陳瀉一陳後重如熱湯便赤煩渴甚四苓散中加山藥蒼朮山梔甘白芍烏梅一個廣陳皮炒草十根水煎卻十一味暑瀉值下月暴泄瀉如水面垢脈來虛自汗煩渴最香茹飲內加參芍茯苓白朮陳皮佐甘草等分加烏梅炒米一撮燈心著九味溫瀉脈微細瀉水腹不痛腹響如雷鳴燥濕藥當用五苓散加山藥陳訶子肉蔻炒砂仁蒼朮泔制甘草炙烏梅薑片與燈心十味風泄脈浮弦瀉便帶清血風冷客腸胃水穀注下泄胃風湯內用人參當歸川芎白茯苓白芍白朮並肉桂粟米同煎效若神七味食積作泄者腹痛甚而瀉瀉後痛即減脈弦即是也香砂平胃散依本方加白朮茯苓去枳實痰泄多與少或少或不少其脈多沉滑小便必然少二陳湯加蒼白朮砂仁山藥炒厚朴木通甘草車前子燈草烏梅薑煎服十二味虛瀉脈微弱食入即瀉卻水穀不能化氣虛脾胃薄參苓白朮散藿香山藥砂仁陳皮薑訶子蓮肉肉豆蔻甘草煎來補胃良十二味脾瀉脈來細食後必倒飽瀉去即便寬扶脾養胃好香砂六君炒白芍人參白朮薑厚朴甘草陳皮山藥同蒼朮烏梅薑煮著十味滑泄瀉無度腸腎虛寒故不禁脈細沉補氣兜塞住八桂散中煨肉蔻訶子粟殼蜜炒妙參朮甘草附子煨乾薑烏梅燈草要十味余方附後戊己丸治脾瀉痢水穀不化腹痛劇酒連煨芍炒吳萸等分為末飯丸劑空心每服五十丸米湯送下立時止三味安脾安胃散參朮二兩生薑同炒熟參苓藿朴術砂甘莪澤木檳五錢足紅棗草四去核皮研末二錢薑湯服十四味止渴極效霍亂脈宜洪大不宜遲微氣少不語舌卷囊縮皆不治也霍亂內傷外感並上吐下瀉心腹痛厥冷脈沉伏欲絶調理脾胃藥必應藿香正氣用紫蘇大腹陳皮桔梗咀白朮茯苓並半夏厚朴白芷草薑挾十一味夏月暑霍亂煩渴出自汗上吐下瀉多脈浮真可斷加減茹苓湯黃連白朮赤苓澤瀉先甘草乾葛天花粉生薑煎服立安然九味霍亂轉筋腹痛吐瀉手足厥冷脈微驚訝理中丸子炮乾薑茯參炙草等分良研末蜜丸一錢重細嚼送下用薑湯四味乾霍亂症不吐不瀉多灌鹽湯吐之不怕溫中湯內平胃散香附砂仁與藿香枳殼木香厚肉桂乾薑加上並生薑十一味霍亂吐瀉後發熱復頭疼身痛口乾渴脈數可全生參胡三白朮苓芍當歸陳皮麥門佐五味烏梅山梔子甘草燈心棗一個十二味霍亂轉筋大蓼一握煎湯燙洗良久浸腳比人以麥粳代之霍亂吐瀉轉筋粗大秫薥葉湯服之立瘥轉筋入腹攻痛欲死搗爛生薑酒煎服止霍亂吐瀉無法可施沸湯冷水合服能醫名陰陽湯霍亂已死腹中尚暖鹽納臍中艾灸莫緩灸莫記數嘔吐脈滑數為嘔代者霍亂微滑者生澀數凶斷嘔吐有聲亦有物胃氣損傷食即出症有寒熱並虛痰對症投方慎毋忽治嘔吐不止聞藥即吐百方不效以伏龍肝為末水丸塞兩鼻孔卻服對症藥遂不再吐嘔吐吐不止飲食食不下和胃與清熱千金也無價保中湯內藿香梗陳皮半夏茯苓等白朮梔子與砂仁甘草芩連炒不冷十味嘔吐噦清水冷涎出不止屬寒脈沉遲理中病自愈理中官桂炒乾薑白朮人參丁藿香茯苓砂仁薑半夏陳皮烏梅一個嘗十一味嘔吐作煩渴此是胃中熱六脈來數時清火藥堪啜黃連竹茹用山梔人參白朮茯陳皮甘草麥門白芍炒烏梅炒米棗煎之十味嘔吐噦痰涎痰與火相煎化痰與清火一服即安然二陳湯里加人參砂仁白朮竹茹煎麥門烏梅山梔炒薑棗同煎病自痊十一味水寒停於胃嘔吐不得止療之宜燥濕脾胃加調理茯苓半夏二陳湯蒼朮厚朴與乾薑砂仁烏梅藿香葉生薑煎服見神方十味嘔吐因傷食飽悶作酸氣消食更和脾嘔吐自然止香附平胃散治傷食嘔吐方見傷食病久只嘔吐胃虛不納穀養胃更和脾王道無欲速六君湯里加歸芍砂仁蓮肉炒山藥藿香烏梅炒米煎生薑棗子為引佐十三味噁心噁心心中常兀兀欲嘔不嘔吐不吐此為噁心非心病寒熱痰虛停食水治之須與嘔吐同隨機應變毋膠柱翻胃脈浮緩者生沉澀者死脈澀而小血不足脈大而弱氣不足翻胃五味七情過五臟火動津液涸氣虛不運則生痰血虛不潤而生火補氣生血養胃脾清火化痰把郁破戒氣斷味慢調和勿行香燥生災禍安胃湯中參朮陳茯苓山藥炒砂仁歸連夏草藿香葉蓮肉烏梅薑棗尋十味順氣和中二陳先白朮枳實炒黃連香附砂仁山梔炒神麯嬌泥河水煎十味王道無憂散二陳香砂四物柏梔芩烏附豬通天麥草赤苓赤芍藿檳尋二十四味三子散治胃翻噎白芥蘿蔔胡荽列等分為末每五分燒酒食後調和啜五子散治氣噎脹蘇蘿芥各五錢重山楂香附各二錢為末合作芥末用年老陰血虛痰火氣結滯飲食不能下乃成膈噎氣當歸養血四物湯枳連陳朴貝沉香香附茯苓紫蘇子瓜蔞竹瀝棗生薑十七味年少患膈噎胃脘血乾竭便調食不下生津與補血生津補血湯蘇子歸芍二黃茯貝母陳枳砂仁炒黃連沉香水磨不用煮十二味嘔吐翻胃愈後調理滋補氣血保和脾胃養血助胃芎歸芍山藥蓮肉一兩銼熟黃薑汁炒八錢扁豆茯苓六錢著人參五錢草三錢白朮一兩三錢佐薑汁曲糊為丸子百丸滾水空心嗑厄逆脈宜浮緩忌弦急結代促微發厄一名即咳逆氣逆上衝而作聲起自胃火為易治陰火上衝最難平發厄屬寒者多因胃口虛手足時厥冷脈沉細無疑丁香柿蒂桂良薑木陳茴乳藿香良厚朴陳皮甘半夏砂仁十四味煎膏發厄屬熱者發熱多煩渴脈數認其真休將熱藥啜小柴胡湯不用參藿茴沉木與砂仁梔子陳皮並柿蒂竹茹烏梅效有神十四味胃中有痰火亦令人發厄清火豁痰涎服之立可得黃連竹茹麥門冬山梔陳皮半夏同沉木茴香紫蘇子砂仁甘草可收功十三味水寒停胃口發厄不得了燥濕與溫寒醫人須要曉茯苓半夏並柿蒂丁香茴香與薑桂厚朴陳皮草砂仁沉木藿香十四味臍下氣上升發厄屬陰火降火與滋陰自然得安可滋陰降火湯方見虛勞治陰火上升發厄依本方加砂仁沉香廣木香山梔柿蒂神妙中氣短不足發厄氣不續六脈必虛微補氣是其福補中益氣湯方見內傷加五味麥門冬黃柏或少加附子傷寒大熱症陽明經內實醫者失於下因而致咳逆六一順氣湯方見傷寒傷寒熱傳經醫誤用薑桂熱藥助火邪痰火發咳逆黃連解毒湯白虎湯及竹瀝之類治之或黃荊子皮水煎服之立止咳瀉痢與傷寒結胸併發黃若還發厄逆難以得安康灸咳逆法乳根二穴直乳一寸六分婦人在乳房下起肉處陷中灸七壯效噯氣噯氣口張氣胸膈氣上升胃中有痰火亦有胃寒並胃熱噯氣有痰有火清火豁痰順氣即可加味二陳炒山梔砂仁白蔻木香宜益智枳連薑厚朴再加附子更為寄十二味胃寒噯氣治要理中順宗開鬱氣血疏通理中湯里去參苓加入茴香益智仁陳朴木香香附子胃寒噯氣服之神八味吞酸吞酸胃中有濕熱吞酸吐酸要分別吞酸上水刺心頭吐酸出水多成噎吞咽酸水濕熱在胃除濕清熱兼化痰治清郁二陳蒼朮芎枳實黃連香附同梔子白芍神麯倍吞酸嘈雜總收功十二味吐出酸水皆屬濕熱濕熱清除莫待成噎蒼連湯內用砂仁半夏陳皮並茯苓神麯甘草吳茱炒生薑煎服立安寧九味吞酸吐酸和胃平肝清火解鬱淡薄可安香砂平胃散方見傷寒依本方加炒黃連山梔吳茱去枳實木香口吐清水濕在胃口利水燥濕自然安了三白湯中用白朮蒼朮壁土炒滑石更有陳皮白茯苓五味將來水煎吃嘈雜嘈雜胃中痰火動亦有血少心驚忡食鬱作嘈立開鬱治當分別莫雷同嘈雜胸中痰因火動豁痰清火投之立中化痰清火半南星石膏知母與黃芩梔連陳皮蒼白朮白芍甘草總堪任十二味嘈雜心中多因血少驚悸怔忡養血為妙當歸補血生熟地參苓白芍與山梔陳皮白朮麥門草烏梅辰砂炒米宜十三味食鬱作嘈飲食傷胃養胃開鬱調理