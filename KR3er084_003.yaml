涎齡固本丹方見諸虐治久年疝氣服之除根痿躄痿者上盛而下虛其人能食不能行內傷氣血兩虛損必須養味與滋榮參歸養榮熟地黃白朮茯苓白芍良陳皮知柏破故紙牛膝杜仲甘草詳十三味清燥湯黃連柏蒼麥門五味子生黃豬苓澤瀉神麯末茯苓補中益氣湯十七味加味四斤菟蓯蓉天麻牛膝木瓜同鹿茸熟地五味子等分蜜丸酒下衝八味消渴脈數大為順沉細為逆上消屬肺中消胃下消腎水皆虛致大生血脈補陰虛自有津液來相濟繅絲湯治三消渴蠶繭殼絲煎湯啜能瀉膀胱伏下火善引陰水往上徹黃連地黃湯用參五味天花白茯苓麥門當歸白粉葛甘草竹葉棗姜等十三味生津養血四物湯知柏薄連生地黃麥門烏梅石蓮肉天花甘草水煎嘗十四味神白散即益元散方見中暑治真陰素被虛損多服金石等藥或嗜炙煿咸物遂成消渴用溫水調服或大渴欲用冷者新汲水尤妙祕方得效治三消用退雄雞湯一瓢將來澄清細細飲能醫消渴免人愁善治三消渴天粉四兩末並水八碗調飲之如活潑六味地黃丸方見諸虛治心腎不交消渴引飲依本方加麥門冬五味子痓病痓病氣血虛風痰所致之頭項身強直搖頭戰四肢背反卒口噤身熱足寒隨無汗若開目剛痓屬陽衰有汗若閉目柔痓屬陰虧諸般發痓病百用養榮醫參歸養榮熟地黃川芎白芍正相當白朮茯苓去皮銼連皮甘草棗生薑十味濁症小便下赤濁心經有虛熱左寸脈短小口苦咽乾渴清心蓮子草黃芩地骨車前赤茯苓人參麥門冬可服黃耆九味藥溫平小便出白濁腎經有虛寒藥宜滋腎氣溫散保平安萆薢飲中益智仁菖蒲烏藥白茯苓甘草五錢各一兩入鹽同服用空心六味小便赤白濁濕熱內傷著水火不分清分清病自卻水火分清枳麻黃萆薢飲子共煎湯豬苓澤瀉車前子術陳半水酒煎嘗十三味瘦人赤白濁元來是虛火降火要滋陰自然得安妥滋陰降火湯方見虛勞依本方加白朮萆薢牛膝山梔萹蓄去芍藥肥人赤白濁是濕痰流下滲入膀胱中須把濕痰化二陳湯方見痰飲依本方加蒼朮白朮人參當歸生地麥門冬山梔黃柏萆薢牛膝萹蓄遺精遺精白濁當驗於尺結芤動緊二症之的心中有所慕夢與人交泄君火相火隨養血清心熱保精湯內歸芎芍生地黃柏知母佐梔連牡蠣炒乾姜麥門石棗沙參銼十三味清心湯內地黃連茯神遠志與人參當歸酸棗石蓮肉甘草減半水同煎九味無夢精自出此是精遺滑內因心腎虛大補真良法養心湯內石蓮肉辰砂遠志草龍骨蓮蕊芡實天麥門酸棗車前桔梗入十二味虛勞瘦弱人陰虛相火動夜夢即遺精滋補頻頻用夢遺日久元氣下陷升提腎氣歸原無患歸原散內參苓朮知柏升陳芎芡實蓮鬚酸棗志麥冬枸杞石棗並蓮肉十六味白粉知柏童便炒蛤粉牡蠣山藥炒等分爛飯搗為丸空心酒下為切要五味淋證五淋膀胱蘊蓄熱氣砂血膏勞之別皆因酒色勞力傷腎經虧損有虛熱必效散當歸麥冬生地山梔滑木通牛枳知母炒黃柏萹蓄赤苓甘草同十三味海金沙散酒當歸大黃牛膝木香宜雄黃等分為細末酒調錢半效神奇六味八正車前與瞿麥萹蓄滑石山梔仁大黃木通入甘草熱淋逢之效若神八味六味地黃丸方見諸虛治小便淋瀝不通倍茯苓澤瀉關格關格上下不相通欲降不降升不升飲食不下氣橫格多因痰氣鬱中停枳縮二陳白茯苓陳皮貝母瓜蔞仁蘇子厚朴撫芎草木香沉香香附尋十三味遺溺膀胱不納為遺溺小便不禁不覺出心腎二經有所虧傳送失度致此疾參耆湯里用升麻茯苓當歸熟地加白朮陳皮厚肉桂益智甘草最堪誇十一味小便不禁有虛有熱虛則補虛熱則清熱虛宜加減四物歸生地芎芍豬苓澤瀉桂白朮茯苓五味子石棗去核十一味熱宜加減解毒用黃連黃柏梔子茯苓先豬苓澤瀉並白朮山茱五味水煎同九味小便閉鼻頭色黃小便必難脈浮弦澀為不小便小便閉不通多因是熱結清熱利水道服之如神捷豬苓湯內滑木通澤瀉車前草麥冬牛膝枳殼並萹蓄瞿麥黃柏共收功十一味通關酒倍知黃柏各稱二兩分明白肉桂一錢熟米丸空心百丸水下得三味小便閉澀不堪言唯用兒茶末一錢扁竹煎湯來送下霎時溲泄湧如泉大便閉屬陽明燥金主血少津液涸竭故燥澀不潤滑也脈滑數為順微細為逆大便實熱閉因食辛熱味活血潤大腸清熱可通利潤腸湯中生熟地火麻桃香與當歸枳殼黃芩川厚朴大黃甘草水煎之十味通幽潤燥湯桃仁生熟地黃當歸身紅花升麻炙甘草大黃煨炒火麻仁九味大便不通腹脹滿大黃研末三錢管五錢皮硝一處和燒酒調服只一碗大小便閉大小便閉結臟腑有實熱並後要清涼通利無他說防風通聖散方見中風治大小便不通鐵腳丸子用皂角去皮子炙研細末酒糊丸用三十丸酒下二便即通活顛倒大黃用六錢滑石牙皂減半研大便小便不同用臨時對症可加添上為末黃酒送下如大便不通依前分兩服之如小便不通大黃用三錢滑石六錢皂角如前如大小便俱不通大黃滑石均分皂角亦如前痔漏脈沉小實者易治浮洪而軟弱者難愈痔有五種牝牡脈腸氣是也痔疾因何致酒色氣風食燥濕與風熱腫痛未破是黑白散內二牽牛為末錢半入豬腰紙裹火煨空心服打下膿血立時消當歸連翹湯地榆荊防白芷草山梔阿膠參朮懷生地芍藥黃芩在後隨十四味秦艽蒼朮湯大黃桃仁澤瀉與檳榔黃柏防風歸皂子痔瘡服之免受殃十味痔瘡腫痛有仙方赤芍芩連蒸大黃枳殼連翹各等分水丸百粒用清湯六味外宣花椒蔥頭艾五倍皮硝馬齒菜茄根煎水頻熏洗連洗數次立可瘥七味痔破潰為漏膿血出於竅濕熱久生蟲攻補兼施妙神雷湯中歸大黃蕪荑鶴蝨枳芩防蘇子蟬蠶龜鱉甲木賊皂刺是仙方十五味痔漏原來有祕方芎