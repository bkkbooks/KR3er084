body:
  text: 卷三頭痛頭痛短澀應須死浮滑風疾必易除肥人頭痛者氣虛有濕痰化痰與除濕補氣病當安加味二陳湯細辛川芎白芷升人參羌活桔梗荊芥穗白朮生薑可救人十一味瘦人頭痛者血虛有痰火降火與清痰補血病自可加味二陳生地黃當歸川芎細辛羌酒洗片芩白桔梗生薑煎服立安康十一味頭痛偏左者屬風與血虛補血仍清火祛風病自除當歸補血用川芎白芍荊芥藁本同柴胡防風蔓荊子香附生黃共有功十味頭痛偏右者屬痰與氣虛化痰仍補氣即此是良醫黃耆益氣用人參白朮陳皮半夏兼芎歸藁本炙甘草升麻黃柏細辛全十二味左右頭俱痛氣血兩般虛補氣兼養血一服見神奇調中益氣用參耆柴柏芎歸併陳皮蒼朮細辛蔓荊子甘草升麻總可題十二味痰厥作頭痛頭旋眼黑暗如在風雲中噁心煩悶亂半夏白朮天麻湯參耆曲麥炒乾姜茯苓澤瀉並黃柏蒼朮陳皮要審詳十三味偏正頭痛者諸風氣上攻頭目昏沉悶壯熱鼻傷風川芎茶調散薄荷白芷防風甘草和更有細辛羌活等荊芥同煎用者多八味熱厥頭痛者見寒痛暫止嚴冬猶喜寒見暖痛復起清上瀉火用歸芎芩連升柏柴荊風蒼蔓藁羌細耆草知母紅花生地同十九味頸項強痛者風邪氣所幹眉稜骨作痛風熱並濕痰頸項強痛者回首散方見中風即烏藥順氣散加羌活獨活木瓜眉稜骨痛者選奇湯內用防風酒洗片芩羌活同甘草更加姜半夏風痰濕熱有奇功五味余方附後此藥名為六聖乳香沒藥川芎雄黃白芷二錢停半兩盆硝共用上件研為細末專醫眼疾頭風耳鳴鼻塞腦不寧一搐牙痛便定頭風腫痛用南星白芷川芎各等平全蠍細茶荊芥穗水煎溫服保安寧都梁丸治頭風痛白芷蜜丸一錢重食後嚼爛細茶吞諸般頭痛皆可用諸般頭痛不堪言花粉胡椒各一錢新艾不拘多與少研末紙卷火燒煙熏入男左女右鼻口噙涼水立安然鬚髮為丸梧子大空心溫酒十五雙十服之後君休摘管教華髮黑加光兼能明目並延壽老翁變作少年郎彭老真人延壽丹乳朱天麥茯歸參志菖杜膝茴香鹽頭髮屬心血稟火氣上生鬚髮屬腎水稟火氣下成五老還童丹堪嗟須鬢白如霜要黑原來有異方不用擦牙並染髮都來五味配陰陽赤石脂與川椒炒辰砂一味最為良茯神能養心中血乳香分兩要相當棗肉戟川芎茯神各十錢生熟知柏只二兩川椒胡桃四兩全黃精四兩姜連制首烏四兩豆蒸玄蜜丸梧子空心服鹽湯溫酒任教吞二十五味上黃精用米泔水煮一沸切片曬乾旱蓮汁四兩生薑汁二兩並酒三味停對熬膏浸黃精半日炒蒼色四兩何首烏赤白兩種捶碎煮於黑豆水上九蒸九曬再用人乳浸透曬乾四兩烏雲倍子炒一錢銅末醋炒五次研生礬白鹽三分末研勻茶汁和稀黏重湯煮沸燒酒少皂水先洗後塗髯包裹一夜茶清洗形如黑漆似神仙四味烏須黑鬢髮一瓶真香油古錢胡桃肉入油埋年周取出捻鬚上即黑如漆同升麻白芷湯葛根蒼朮芍藥黃耆參更有防風與甘草蓮肉燈心效如神十一味此方系面病之方面病頭面生瘡癤上焦風熱毒解毒與祛風其效如神速清上防風湯薄荷梔翹芩梗甘草和川芎白芷黃連入荊芥枳殼一同銼十二味面唇生紫黑陽明經不足升補元氣虛立見光如草薑棗煎服在午前九味人有面熱者陽明多見熱祛風除熱邪面顏生歡悅升麻黃連湯犀角薄荷荊芥川芎芍蒼朮白芷酒黃連甘草黃芩酒炒耆十二味人有面寒者陽明經虛寒補虛溫寒指日可開顏升麻附子湯白芷人參乾葛並黃耆益智草蔻炙甘草蔥白同煎效有餘抓破面上皮生薑自然汁輕粉末調搽患處無痕疾耳病耳者腎之竅腎虛耳聾鳴滋腎降虛火其耳自聰明滋腎通耳湯知母芎歸白芍並香附柴胡白芷生地黃黃連黃芩酒炒助十味耳聾多因腎虛致全蠍生薑等分制炒至生薑干為末三錢酒調臨睡吃二更儘量醉飲之次日耳作笙聲是人耳左聾者忿怒動膽火清火更平肝劑投如開鎖龍膽湯中用膽星當歸梔子並連芩陳皮木香香附子乾薑青黛與玄參十三味人耳右聾者色欲動相火降火與滋陰鳴聾立安妥滋陰地黃乾山藥茯苓知柏芎歸芍瀉澤遠志石菖蒲山茱牡丹皮同佐十三味獨勝丸治耳鳴聾黃柏乳汁浸曬乾鹽水再炒麵丸藥空心鹽湯服有功兩耳俱聾者厚味動胃火清胃去風熱藥用酒炒過防風通聖散兩耳腫痛者腎經有風熱兩耳若出膿風熱不須說兩耳腫痛宜荊芥連翹用防風柴胡梔子芍歸芎枳殼黃芩鹹甘草白芷桔梗總相同十味兩耳出膿者宜蔓荊子散用升麻木通桑白赤苓加赤芍生黃炙甘草前胡麥門甘菊花十味氣閉作耳聾氣復耳自明痰火氣鬱悶煩躁不安寧通明利氣解毒湯生地蒼白朮檳榔撫芎陳皮香附米貝母玄參草木香十味耳聾不聽言細辛蠟熔丸綿裹入耳內數日即安痊氣閉耳聾用蔥白一頭入麝送耳中外頭以艾炙一燋管教聾閉玄時通鼻病左寸脈浮緩為傷風鼻塞鼻流清涕右手脈浮洪而數為鼻衄鼻齇感冒風與寒鼻塞聲音重清涕忽長流發表藥堪用通竅湯用羌防風乾葛升麻黃芷芎藁本細辛蒼朮草引用花椒姜並蔥十一味肺經有風熱鼻不聞香臭麗澤通氣湯一服還依舊麗澤通氣湯黃耆生葛蒼麻黃白芷甘草防風羌獨活川椒煎服氣通之十一味膽移熱於腦則辛額鼻淵濁涕下不已常常如湧泉荊芥連翹湯薄荷柴胡芎歸生地和白芷防風芩梗芍山梔甘草不須多十四味鼻淵出涕日長流參芷芎歸茯麥求荊防薄蔓秦艽草香附蒼耳一兩頭天竺三錢研細末蜜丸梧子米湯投人有赤鼻者熱血入於肺而成酒齇鼻養血清火治清血四物用芎歸白芍生地茯陳皮黃芩紅花甘草減水煎調下五靈脂十二味鼻頭紫黑者多是感風寒血冷則凝滯活血是靈丹當歸活血芍防風芩梗梔翹薄芷芎牡丹紅花甘草入荊芥薑茶大有功十四味口舌舌吐不收名曰陽強舌縮不能言名曰陰強口舌生瘡痛三焦實炎盛養陰以退陽食遠頻頻進加減涼膈散連翹枳桔芩連梔子饒生地當歸薄荷葉甘草芍藥免憂愁十一味赴宴散中芩連柏梔子細辛乾薑則等分為末用少許搽於患處立可得六味緑袍黃柏一兩研再加青黛末三錢每用少許搽患處噙之良久吐出涎二味大凡患口瘡涼劑投不已氣虛火炎上理中湯可治理中湯方見中寒依本方服之即愈甚者加附子或用官桂末摻之牙齒牙痛不可忍辛熱厚味過胃中積濕熱清火笑呵呵清胃散生地黃連牡丹當歸身要全升麻入水同煎服止痛如神不可傳五味瀉胃湯中歸赤芍川芎生地南薄荷防風荊芥山梔子牡丹黃連甘草和十一味開口呷風則痛甚腸胃之中有風邪開口臭氣不堪聞腸胃濕熱甚非些當歸連翹飲白芷細辛生地草山梔荊芥白芍並羌活黃芩川芎水煎之十一味蟲食而痛者腸胃有濕熱清火更誅蟲止痛如手捻定痛散內用連翹當歸生地細辛椒桔梗苦參並白芷烏梅黃連甘草饒十味牙齦宣露者胃中有客熱心煩不欲食熱瘡生咽舌甘露飲子枇杷葉石斛茵陳枳殼切甘草生熟地黃芩天麥門冬清客熱十味牙齒動搖者此乃腎元虛擦牙並固齒補腎最為宜馬蜂窩與白蒺藜花椒艾葉蔥蒂須荊芥細辛香白芷醋煎噙漱吐為奇八味六味地黃丸方見諸虛固齒白蒺並生地故紙炒各二兩是沒石四個附四兩青鹽兩半擦牙齒噙漱藥川烏草烏與防風荊芥薄荷紫蘇同半夏甘草同黑豆花椒艾葉水三鍾煎至七分來嗽口牙疼齒痛永無蹤十一味噙漱藥治牙腫痛風牙蟲牙牙動牙長痛不可忍擦牙藥擦牙止痛固齒石膏火煅斤許四兩真正青鹽再加二兩白芷細辛一兩為末一擦牙疼立止四味牙咬藥巴豆一個微燒研勻三粒胡椒帛包牙咬流水登時千金一笑余方附後烏須固齒補腎方白芍芎歸熟地黃荊附枸膝二兩半故紙兩半要相當細辛三錢升麻五青鹽三兩共研良老米一升做丸藥陰乾罐固火燒桑存性為末頻擦齒滾湯漱咽永無傷十二味擦牙烏須白茯苓要好遼東香細辛倍子牙皂炒存性等分研末擦牙靈眼目眼是臟腑之精華瞳人屬腎黑肝家眼胞屬脾白珠肺兩眥屬心經不差暴發赤腫痛上焦風熱甚清火併祛風一掃云開淨退血散中芎歸芍梔翹芩防荊薄荷蒺藜白芷甜葶藶生地桑皮燈草和十四味救苦芩連柴柏麻芎歸龍膽草紅花羌防翹梗蒼知母生地藁本細辛佳十九味洗肝明目歸芎芍生地芩連荊防佐梔翹藁薄羌菊花蔓蒺草決梗可銼十九味眼目腫痛澀開難黃連去蘆五錢研薄荷減半雞清和隔紙塗眼病當痊眼生翳瘴隱澀難開羞明怕日赤腫眵堆明目流氣菊荊防牛蒡玄參芎細蒼蒺藜蔓荊芩賊草決明梔子薄荷湯四明飲大黃澤瀉葛花攢石決用火煅白水共煎嘗羊肝丸子用芎歸薄菊荊防羌活宜各用三錢研細末黃連一兩緊相隨白乳羊肝生一具搗為丸子水吞之不問諸般患眼疾昏花翳瘴總能醫九味從病目昏暗腎水真陰微昏花不欲視補腎是良規滋腎明目四物湯生參菊花生地黃桔梗山梔蔓荊子黃連白芷草煎湯六味地黃丸方見補益治腎虛昏暗眼不奈視神光不足加當歸枸杞甘菊花各二兩半十全大補湯方見補益治血氣虛損之人久服寒涼過度以致眼目黑暗全不通路加沉香大附子童便制過白豆蔻壯腎水以鎮陽光神祕羊肝百膽丸烏須明目效通玄老人血衰筋骨痛除淋滋水養丹田黑雄羊肝用一具去筋切碎要新鮮再入羊膽至百個夜浸日曬待乾研柏子川芎生地芍各五四兩莫教偏酒浸當歸身八兩地黃搗爛作膏丸空心百粒鹽湯下留取仙方海內傳咽喉咽喉忽腫痛風熱痰火重外要吹咽喉內把清涼用吹喉散白礬銀硃量入研頻頻吹患處腫痛立安然咽喉腫毒死須臾細辛為末一錢齊巴豆五分同搗爛紙卷塞鼻免災危二味喉痹單鵝風腫痛山豆根研細末用雄膽和丸緑豆大雞胵為衣二味共一丸放在舌根下徐徐咽之立可中清涼散子甘桔梗梔翹芩連枳殼等防風當歸生地黃薄荷頻服休教猛十味清咽利膈散芩連梔翹荊活草玄參薄荷硝黃牛蒡子金銀花與防風全十四味血虛火上升喉痛生瘡痛養血降虛火病愈如風送加味四物湯黃柏知母藏桔梗天花粉甘草水煎嘗清上薄荷葉五錢一分雄膽與青鹽硼砂一錢膽礬許雄黃五分一處研白糖化丸芡實大一丸舌下化之吞痄腮作痛腫上焦風熱症外貼內服藥奏效不旋踵驅風解毒散防風荊芥連翹一處攢甘草羌活牛蒡子水煎食後奏神功六味灸喉痹法灸耳垂下三壯神功又法灸陽池二穴三壯灸訖扯頭髮三下結核人身結核者風痰氣鬱結皮裡膜外生硬如果中核清風化痰星半芍防羌蠶蠍甘翹角枳桔陳麻膝附蒼金銀天門木通著化風七粒萆麻子捻爛紙卷雞子裹煨熟去麻只食蛋一早二枚酒下吃專治結核瘰癧項後疙瘩色不變不問大小深年月山藥一塊萆麻子三個研勻攤鼻貼二味梅核氣梅核七情氣如核如破絮咯不出不下痞悶滿胸臆加味四七青陳朴茯苓南星半枳實神麯白蔻益智仁檳榔蘇梗縮砂仁十三味癭瘤五癭著肩項六瘤隨氣結皆不可決破崩潰致夭折消瘤五海布螵蛸海藻海帶海蛤饒稜莪辛梗木香附珠琰七個土炒焦十二味肺癰脈短而澀者易治浮大者難痊肺癰咽燥渴咳唾有膿血腥臭與濁味肢腫胸痛切桔梗湯內杏桑皮黃耆貝母草當歸薏苡瓜蔞仁枳殼防風百合總相宜十二味肺痿寸口脈數而虛肺痿也肺痿久咳嗽唾沫無膿血小便數不渴汗多津液竭薏苡散中炙黃耆人參五味子當歸白芍麥門冬百部黃芩加入並桑皮十味心痛即胃脘痛痛甚脈必伏心痛即胃痛初寒稍久熱其痛有