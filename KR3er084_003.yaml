草用些須黃酒煎熟放再入小薊汁服之如影響血崩久不止一兩炒靈脂香附二錢炒六錢當歸尾研末每二錢空心黃酒吃或用米醋丸醋湯五十止血崩久不止黑豆燒盡煙二錢黃酒和一服立安然血崩久不止管仲燒存性為末黃酒調服之立有應血崩久不止小薊搗取汁童便酒調和服之病如失血崩久不止漆燒灰三錢五靈脂豆大研末黃酒吞血崩久不止柿餅燒二錢空心煎水下神效不虛傳帶下婦人帶下宜遲滑忌虛浮赤白帶下宜虛弱濕痰滲入在膀胱頭暈腰痠眼花暗四肢無力補虛良玉仙散用炒白芍乾薑香附一兩銼甘草研末五錢生空心三錢酒下藥四味加減六合湯二陳四物當黃柏知貝母椿根白朮良十三味赤白帶下臍腹冷痛下焦虛寒溫補當用加味五積散方見中寒依本方去麻黃加香附吳茱萸小茴香一方加乳香沒藥各三錢半烏藥一兩米糖一斤好酒煮吃余方附後白帶腹痛寒涼胡椒硫黃丁香等分一錢細末入在雞子潛藏紙裹火煨透熱細嚼酒下安康白帶久不止二兩白茯苓石灰研一兩水丸水下靈白帶久不止硫黃末五錢三錢烏梅肉同搗爛為丸每服五七粒空心溫酒吞白帶久不止黃荊子炒研空心米飲和每服二三錢赤白帶不止倍子桃仁炒等分為細末燒酒調服好虛勞婦人虛勞右寸數者危也虛勞痰嗽骨蒸熱陰虛火動妄行血治宜養血健胃脾清痰降火開鬱結婦人吐血漸成勞怯止血補陰乃是良訣清肺飲子四物湯天麥知貝與蒲黃前胡阿膠陳枳草薄荷黃芩藕節良十七味虛勞熱嗽痰喘有汗心脾兩虛滋補勿緩滋陰至寶芍當歸茯苓白朮草陳皮薄荷柴胡知貝母香附地骨麥門宜十三味虛勞熱嗽痰喘無汗化痰清火心虛可斷茯苓補心前胡參紫蘇半夏當歸身甘草陳皮川芎芍地黃熟用棗姜煎十一味六味地黃丸方見補益治婦女虛勞之要藥也求嗣螽斯祕訣三十時辰兩日半二十八九君須算落紅將盡是佳期金水過時徒霍亂徒霍亂兮枉費功樹頭樹尾覓殘紅解得花芳能結子莫愁後代繼前蹤結胎受形洞里桃源何處尋都來一寸一分深交歡之際君須記過卻區區枉費心虛實論他虛我實效乾坤以實投虛是的真總是兩家皆寡欲佳期相值始相親占男女訣雙歲是雙單是單乾坤爻位兩頭安中間正位玄機事産女生男在此間婦人無子嗣多因經不調經調交必孕種德養根苗調經種玉是仙方陳茯芎歸芍地黃香附吳茱索牡丹虛加熟艾桂乾薑九味銼四劑生薑水煎空心溫服渣再前服待經至之日服起一日一劑藥盡則當交媾必成孕矣肥人是痰盛軀脂多滿溢閉塞於子宮消痰養血氣清痰養血四物湯白朮陳皮半夏良茯苓枳實並香附甘草砂仁竹瀝嘗十二味瘦人是火盛子宮多幹澀補血與清熱調經為主訣清燥養血四物宗人參茯苓香附同生地黃芩山梔子陳皮甘草共收功婦人子宮冷氣血多虛備調經補下元嗣續衍宗派先天歸一參苓朮芍地歸芎草牛膝陳半砂附牡丹皮大補諸虛成孕育十四味六味地黃丸方見補益治婦人血虛無子加香附子二兩童便炒當歸二兩酒洗妊娠妊娠之脈如何認要辨陰陽衰與盛陰陽俱盛滑而和兩手調勻數相應其人能食身無苦容飾如即是妊定脈來左盛是男形右手偏洪是女孕孕真帶嘔頭昏悶此是停痰惡阻病急宜正胃與消痰固血安胎全兩命若還腰腹俱脹痛口渴咽乾潮熱乘多眠惡食倦昏疲此屬經凝卻非妊大綱孕脈類如此在意消詳審安靜婦人妊娠脈宜洪大忌沉細經脈不行已經三月尺脈不止是胎無惑驗胎散內用川芎艾湯調服一錢重有孕腹中覺微動不動是孕經不通婦人有胎須要防墮養血健脾清熱無過安胎散內益母草當歸川芎香附炒芩連白朮生地黃蘇梗砂仁甘草好十一味妊娠惡阻噁心嘔吐阻其飲食調和胃土調胃湯中炒神麯歸芍陳皮並香附藿香砂仁白茯苓半夏白朮甘草付十一味妊娠子癇煩躁悶亂膽怯心驚虐亦可斷竹葉湯黃芩防風白茯苓麥門去心浮五味藥通神妊娠子癰目吊口噤痰涎潮搐頭項強甚羚羊角散白茯苓芎歸防風酸棗仁茯神五加皮薏苡獨活木香甘草真十二味妊娠子懸心腹脹痛胎氣不和致生諸症紫蘇飲內歸芎芍人參大腹陳皮佐甘草銼散薑蔥煎胎前出入加減著八味妊娠子腫面目虛浮肢體腫滿用藥立消茯苓湯中用澤瀉芎歸熟地應無價茯苓白朮麥門冬厚朴梔子條芩下十味妊娠子氣兩足浮腫脾衰水盛喘悶上壅天仙散內用臺烏香附陳皮並紫蘇更有香附與甘草生薑煎服病即除七味妊娠子淋小便頻數赤少澀痛下焦火爍子淋散內用木通赤苓大腹麥門冬甘草再加淡竹葉空心一服可收功五味五苓散方見中暑依本方加阿膠炒妊娠胎漏腹痛下血養血安胎健脾清熱芎歸各五錢銼散好酒煎臨服入童便一劑病當痊膠艾四物湯條芩白朮強砂仁香附子糯米共煎嘗十一味妊娠胎動因事築嗑惡露下血口噤欲絶佛手散當歸川芎益母宜水煎入酒服一劑見安危達生散內當歸芍人參白朮陳皮佐紫蘇甘草大腹皮或加砂仁並枳殼十味孕中口噤忽然吐沫不省人事語言昏錯清心豁痰四物湯二陳加入最為良麥門遠志菖蒲等竹茹還用水生薑十一味婦人鬼胎如抱甕吳茱川烏須制用柴胡秦艽白殭蠶為丸七粒用酒送五味産育臨産莫愴惶從容立主張慎勿使手取用藥要安詳生産難分娩飛金五七片溫水研服之母子立相見濟生藥治産艱難芎歸枳殼紫蘇攀香附大腹皮甘草立時産下見歡顏七味催生立應冬葵子芷芍芎歸大腹皮牛膝車前並枳殼水煎入酒立生兒九味香桂散能下死胎白芷肉桂三錢該三分麝香同研末童便酒調服下來三味柞木飲子用生枝甘草些須水煮之立候産母腹痛甚溫投一服見神奇巴三草七脫衣裳細研如泥入麝香捏作餅兒臍下貼須更子母便分張三味胞衣不得下産母元氣虛芎歸倍官桂溫之下片時三味脫衣湯用川牛膝歸尾木通白滑石冬葵子或加枳殼水煎溫服保安吉六味産婦面赤舌色青母活子死必然情面青舌青沫又出母死子活實堪驚唇口俱青子母死臨時審察要分明産後新産之脈緩滑吉實大弦急死來侵産後諸疾以末治之大補氣血對症詳施芎歸調血茯陳姜香附臺烏熟地黃白朮牡丹益母草産後諸疾服之良産後暈倒不省人事眼黑耳鳴虛損之極加味佛手散芎歸荊芥穗等分用水煎入酒童便對産後惡露上攻心腹或作眩暈寒熱交互益母保命方益母草煎湯加入童便酒惡露下行良産後去血多或下流不止頭暈眼黑暗口禁不能語蘇危湯內炒乾姜川芎當歸熟地黃人參荊穗燈燒過水煎童便可加嘗六味産後惡露心腹刺痛久積瘀血兒枕通用失笑散內五靈脂蒲黃炒各一錢宜研末醋熬為膏子白湯化服有神奇二味黑神散用熟生黃赤白芍蒲靈附姜玄歸棕灰各一兩五錢沉香與乳香研末二錢童便酒胎前産後服之良十三味上治胎前産後十八症如神乳病乳汁不通氣血壅盛脈澀不行滯而成病通草湯中用連翹桔梗柴胡瞿麥饒青皮白芷天花粉赤芍木通甘草苗十一味乳汁不通氣血不足因而澀少補虛效速王不留行散木通當歸白芍與川芎生地天花各等分豬蹄煎湯藥有功七味胡桃去皮用十個搗爛一錢山甲末黃酒調服只片時來如泉湧堪止渴吹乳乳癰血脈凝注初宜蔥尉久要消毒生蔥搗一餅攤在患乳上火罐覆蔥餅汗出即無恙夜明蜘蛛用三個紅棗三個夾炒過嚼吃燒酒送下咽已成未成立消破吹乳腫硬痛螃蟹蓋炒用研末每二錢黃酒把藥送一方貝母白芷各二錢末酒吃一方牙皂密蒙為末酒下法一方白丁香末二錢酒服止消毒飲中金銀花瓜蔞貝母皂刺佳天花白芷當歸尾甘草山甲共堪誇九味上治吹乳乳癰殊效婦人乳岩始有核腫狀如棋子不痛不癢疏風行血急治影響日久成瘡療難勉強一十六味流氣飲芎歸耆芍桂檳參枳桔防風烏藥草厚朴蘇芷木香真
