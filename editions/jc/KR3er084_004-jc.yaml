錢以上四味後用煮酒為末用上藥二十四味共五斤四兩用糯米二官鬥淘淨浸一日夜又淘一次蒸作糜取出候冷用細曲末四斤同天門冬等分八味和勻卻將淫羊藿等十二味貯於粗絹袋置缸底將前糜拍實於其上然後投上品燒酒四十斤封固一七日榨出澄清方入壇內加砂仁等四味封固重湯煮三炷香埋土中三日以出火毒每日量飲數杯一七日百竅通暢渾身壯熱丹田微癢痿陽立興切忌醉酒飽食行房只待氣血和平緩行無事久久純熟自然身輕力健百病不生若男女共服兩精和合一度成胎功效多端未可悉舉珍之重之邵真人追風換骨丹治中風不語左癱右瘓腳手不能屈伸渾身麻木腫痛口眼喎斜語言蹇澀手足頑麻每遇春夏發動腳踝頻痛筋脈緊急行步少力下注膀胱上攻頭目腫痛夾腦風症偏正頭風神思昏沉二便或閉或澀眉發脫落風癩腫毒血風破傷風一切諸風並皆治之人參去蘆一兩白朮去蘆一兩白茯苓去皮一兩當歸一兩白芍一兩川芎一兩半防風去蘆兩半白芷一兩天麻一兩川烏一兩炮去皮柴胡一兩薄荷一兩半牛膝去蘆酒洗一兩兩頭尖炙一兩半木香五錢乳香五錢沒藥五錢虎脛骨酥炙一兩真白花蛇一條為末上為末用麻黃二十斤草烏四兩銼碎盛於桶內用水浸春五夏一秋二冬五晝夜分作四份用大鍋四個各煮數十沸濾去將渣於石臼內搗爛另用清水攪勻仍分作四鍋煮數沸去渣不用卻將二次所煎藥汁總作四鍋文武火熬至一半並作二鍋漸熬並至一鍋再熬至四五碗然後將白花蛇末下於鍋內慢火熬至一二碗傾在磁器內候冷下前十九味藥末搜和成劑每服一丸大樣二錢重中樣一錢半小樣一錢量病輕重加減研爛用好酒一大鐘連須蔥白七根同煎數沸調藥熱服令病人暖處被蓋臥出汗調理旬日不可見風忌動風之物其病即愈修合藥時擇良日淨室毋令婦人雞犬見之養心益腎百補丹補益元氣培填虛損真精內之以致胃氣怯弱下焦虛憊及夢泄自汗頭眩眼黑耳鳴四肢無力補養之聖藥也其功不能盡述懷生地黃八兩酒洗蒸如泥合石器內搗之甘枸杞子四兩酒洗山茱萸酒蒸去核取肉四兩懷山藥四兩白茯苓去皮三兩乳汁浸蒸牡丹皮三兩柏子仁三兩微炒覆盆子二兩遼五味子二兩菟絲子水洗淨酒蒸搗爛成餅焙乾三兩澤瀉二兩上為細末用蜜八兩入斑龍膠內先煉次入浮小麥粉四兩芡實粉四兩水調亦入膠蜜同煉熟和諸藥杵千餘下丸如梧子大每日早晨空心服百丸淡鹽湯送下制斑龍膠法此膠能生精養血益氣和胃順暢三焦培填五臟補心腎美顏色卻病延年乃虛損中之聖藥也鹿角連腦蓋骨者佳自解者不用去蓋至生淨五十兩截作三寸段新汲泉井水浸洗去垢吹去角內血腥穢水盡同人參五兩天門冬去心皮五兩麥門冬去心五兩甘枸杞子去蒂八兩川牛膝去蘆五兩五品藥以角入淨壇內注水至壇肩用箬殼油紙封固壇口大鍋內注水木甑蒸之文武火蜜煮三晝夜足時常加入沸湯於鍋內以補乾耗取出濾去渣將汁復入砂鍋內熬成膠聽用和藥末其角去外粗皮淨者為末為鹿角霜也亦有可用處陰煉秋石法每童子小便二桶用淨水一桶牙皂一個煎湯同投入大缸內以竹棍攪打千余匝待澄清了輕輕倒掣去清水留下白角又復用清水如前法九遍澄下者乃秋石也用細絹濾過置一灰缽捺一凹放灰上鋪白綿紙三層將濾出秋石傾在紙上待陰乾日曬以太陽夜露以太陰以受日精月華也收置緊密合藥時以少壯婦人乳汁和之入鹿膠內夫斑龍秋石系仙家築基之丹非特去病而已也敬之慎之亦可清晨空腹隆冬醴酒調服二三匙合斑龍膠大補歌曰尾閭不禁滄海竭九轉靈丹都慢說惟有斑龍頂上珠能補玉堂關下血眼藥撥雲膏治眼目腫痛風熱癢爛翳瘴昏蒙制熟爐甘石濃煎黃連汁湯研而飛過三錢上等黃丹水飛九次烘乾三錢乳香三分沒藥三分銅器內炒去油研硼砂五分海螵蛸滾湯煮淡去外皮三分冰片五分麝香五分膽礬一分上研極細口內試嚼噙以無砂為妙用好蜂蜜沸湯中陰煉滴水成珠入藥和勻磁器盛之不時點之殊效膏藥趙府秘傳萬病無憂膏治風寒濕氣所傷跌撲門挫傷凡一切疼痛皆貼患處心腹痛俱貼患處哮吼喘咳貼背心瀉痢貼臍上頭痛眼痛貼太陽穴及治一切無名腫毒癰疽發背疔瘡癤毒流注濕毒臁瘡初覺痛癢便貼患處即消已成亦可止痛箍膿長肉生肌百發百中其功不能盡述川烏草烏大黃各六錢當歸赤芍白芷連翹白蘞白及烏藥官桂木鱉子各八錢槐枝桃枝柳枝桑枝棗枝各四錢加苦參皂角各五錢上銼散用真香油二斤浸藥一宿用火熬藥焦色以生絹濾去渣不用將油再熬一滾入飛過黃丹十二兩炒過陸續下槐柳棍攪不住手滴水成珠為度離火次入乳香沒藥末各四錢攪勻收貯退火毒聽用一方加蘇合香二錢尤妙萬應紫金膏治跌撲傷損手足肩背並寒濕腳氣風毒痛不可忍瀝青一兩半靈仙二兩蓖麻子十兩去油木鱉子二十個去殼研乳香一兩筍箬炙為末沒藥一兩為末黃蠟二兩生薑二斤搗汁一碗生蔥搗汁一碗麻油夏二兩春秋三兩冬四兩先同靈仙熬去渣滴水成珠為度上將瀝青研末同二汁下鍋熬化看二汁盡時卻起鍋將柳條不住手攪卻威靈仙油同熬再下木鱉子蓖麻子搗勻入內再煎又下乳香黃蠟再攪即成膏矣每用好厚絹紙貼先將姜擦患處後貼上即用烘熱鞋底熨之瀉痢貼丹田咳嗽吐血貼背心上風損貼患處題醫師龔雲林先生儲存成一首道得軒岐秘心同天地仁回春起萬病神彀邁群倫醫鑑追前哲仙方啟後人恩光普天下共樂太平春賜進士第亞中大夫曲東遼海參政永平王大用書
