body:
  text: 卷四小兒科八門審候歌觀形察色辨因由陰弱陽強發硬柔若是傷寒雙足冷要知有熱肚皮求鼻冷便知是瘡疹耳冷應知風熱症渾身皆熱是傷寒上熱下冷傷食病五指梢頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷麻痘症相傳女右男分左分明仔細看觀面部五色歌面赤為風熱面青驚可詳心肝形此見脈症辨溫涼脾怯黃肝積虛寒㿠白光若逢生黑氣腎敗命須亡小兒三歲以下有病須看男左女右手虎口三關從第二指側看第一節名風關第二節名氣關第三節名命關辨其紋色紫者屬熱紅者屬寒青者驚風白者疳病黑者中惡黃者脾之困也若現於風關為輕氣關為重過於命關則難治矣三關脈紋主病歌紫熱紅傷寒青驚白是疳黑時因中惡黃即困脾端青色大小曲人驚並四足赤色大小曲水火飛禽撲紫色大小曲傷米麵魚肉黑色大小曲脾風微作搐手指脈紋八段錦魚刺形主驚風痰熱懸針形主傷風泄瀉積熱水字形主食積咳嗽驚疳乙字形主肝病驚風環形主疳積吐逆蟲形主疳蟲大腸穢積珠形主死亂紋主蟲小兒至三歲以上乃用一指按寸關尺三部常以六七至為率添則為熱減則為寒浮洪風盛數則多驚沉遲為虛沉實為積小兒脈法總歌小兒有病須憑脈一指三關定息數遲冷數熱古今傳浮風沉積當先識左手人迎主外證右手氣口主內疾外候風寒暑濕浸內候乳食痰積致洪緊無汗是傷寒浮緩傷風有汗液浮洪多是風熱盛沉細原因乳食積沉緊胸中痛不休弦緊喉間作氣急急促之時痘疹生緊數之際驚風至虛軟慢驚作瘛瘲緊實風癇發搐搦軟而細者為疳蟲牢而實者因便閉脈芤大小便中血虛澀有氣兼驚悸滑主露濕冷所傷弦急容忤君須記大小不勻為惡候二至為脫三至率五至為虛四至損六至平和曰無疾七至八至病尤輕九至十至病勢極十一二至死無疑此決萬中無一失小兒死候歌眼生赤脈貫童人囟門腫起又作坑指甲黑色鼻乾燥鴉聲忽作肚青筋虛舌出口咬牙齒目多直視不轉睛魚口氣急啼不得蛔蟲即出死形真手足擲搖驚過節靈丹十救無一生魚目定睛夜死面青唇黑晝亡啼而不哭是痛哭而不啼是驚嗞煎不安是煩嗞哇不定是躁小兒初生雜治小兒初生後甘草並黃連濃煎汁灌服吐出穢惡涎延生第一方小兒臍帶良燒存性研末硃砂減半量二味和勻用當歸生地黃煎汁調前藥令兒口內嘗次日下穢惡痘毒永潛藏滌穢免痘方神仙真秘藏經霜楝樹子升許水煎湯元旦子時分洗兒只令娘自從洗過後永不出痘瘡洗時父母只令一人知之勿泄天機小兒臍風腫痛田螺三個搗用入麝少許搭臍須臾再易必中臍風全蠍七個尾七節火烤研極細乳汁送與孩兒吞頭上汗出如手取小兒夜啼聲不歇蟬蛻七個下半截研末薄荷湯調和入酒此須一同啜小兒夜啼哭燈花三顆足乳調抹兒口勿用去求福急驚急驚風症牙關緊急喘熱涎潮手足搐搦竄視反張風邪痰熱急驚屬肝有餘之疾敗毒散內加天麻全蠍殭蠶白附佳地骨真皮各等分急驚原屬外風邪十五味即人參敗毒散方見傷寒依本方十味加上五味是也神功散一粒硃砂一片雪七個殭蠶三個蠍不論急驚與慢風藥引須用生人血即乳汁小兒急驚發搐搦喉中痰響目直視蘆薈面丸每五丸燈心竹瀝湯送去萬億丸治急驚風胸痞悶腹脹痛方見通治牛黃抱龍丸膽星一兩研五錢真天竺牛黃五分先朱雄二錢半麝珍琥一錢甘草膏丸藥金箔作衣穿每服二三粒研化薄荷吞急慢驚風症痰嗽喘熱痊九味慢驚慢驚風症吐瀉傷脾肢體逆冷口鼻氣微手足瘛瘲昏睡露睛慢驚屬脾不足之症醒脾散內用茯苓木香白附子人參殭蠶全蠍天麻等白朮甘草炙相兼九味白朮散方見吐瀉治小兒吐瀉慢驚已作加細辛天麻全蠍白附子硃砂黃耆湯治慢驚風甘草人參三味同白芍一錢加入內瀉肝補肺有奇功紫金錠藥本芥參朱神脂乳各三錢麝香一錢糕一兩丸彈金衣薄荷研九味混元丹治慢驚風如神方見通治慢驚慢脾危惡症候藥力不到者但看兩腳面中間陷處有太衝脈即灸百會穴三五壯炷如小麥大灸後仍與醒脾之劑調之灸法治小兒驚風男左乳黑肉上女右乳黑肉上周歲灸三壯二三歲灸五七壯神效疳疾小兒脈單細為疳勞虎口脈紋白色為疳凡養小兒須戒性酒肉油膩偏生並生冷硬物涼水漿不與自無疳癖症消疳飲內炒黃連白朮茯苓白芍先青皮澤瀉山楂肉甘草半薑棗共煎九味面黃眼腫肚腹脹肚中一塊或上下小便白色大便溏四君加入梔蕪當六味小兒疳積腹如鼓蝦蟆鹽湯蔥椒煮每日須用四五枚吃到病好以為度肥兒參連曲麥楂各用三錢半不差茯苓甘炙三錢重五錢胡黃莫要誇使君去殼四錢半蘆薈二錢半煨佳黃米糊丸米湯下疳癖功效滿天涯十味上蘆薈用穀糠火煨透用之癖疾脈沉細為癖疾癖疾僻兩脅結塊硬如鐵發熱肌瘦黃養正邪自滅淨府湯中用茯苓稜莪豬澤半人參柴胡白朮黃耆等山梔甘草胡黃連十三味抑肝扶脾術苓參楂曲青陳柴黃連龍膽甘草白芥子癖塊發熱棗姜煎十二味治癖雞子五個五分阿魏無錯黃蠟鍋內同煎分作十服細嚼空心溫水送下大便下血癖破三味小兒癖疾堪嗟水紅君子山楂白朮神麯五錢減半木香麥芽白麵黃蠟水和煎餅伍用無差九味金蟾兩個大蛤蟆二兩大黃為末佳半碗皮硝一處搗絹袋盛貼在癖家三味至寶阿魏用二錢天竺蘆薈胡黃連雄黃沒藥山甲炒白草炭泡硇砂兼沉香各用二分末好酒和藥慢火煎丸如豌豆每一粒黃酒化下汗為痊十味消癖退熱如神可暫服不可久服烏金丸子遇仙傳白朮人參用六錢地骨稜莪水紅子黃連檳榔七錢研琥珀胡連五錢等蘆薈百草伏龍全三味三錢牛黃二研末糯米糊作丸丸如綠豆每三十陳皮湯下伐癖根十四味久服癖根自拔神功癖患牙疳潰爛時乳沒茶清燒象皮象牙珍珠紅蠍子海巴等分末搽之九味諸熱小兒驗諸熱症驚熱恍惚頻頻叫風熱汗出通身熱積熱頰赤口生瘡潮熱有時發又歇餘熱寒邪未盡除壯熱一向發不歇癖熱飲水嗽多痰發如瘧狀為寒熱骨蒸盜汗熱因疳心躁不安不煩熱夜熱暮發早又停食熱肚皆先發熱虛熱困倦氣力衰客熱來去無時節血熱發在辰巳時耳鼻尖冷乃瘡熱諸熱得之各有歸好隨輕重為調攝小兒諸熱蘊積熱毒先宜清解後分虛實大連翹飲用防風歸芍車前滑草通瞿麥荊芥牛蒡子蟬蛻柴胡梔子同十四味五福化毒烏犀角粉草朴硝三錢佐生地赤茯牛蒡子連翹玄參五錢銼青黛二錢末蜜丸薄荷湯化一丸藥九味感冒小兒感冒風寒鼻塞痰嗽喘熱發表解厄參蘇飲方見咳門羌活膏用獨活參麻梗芎前各五錢薄甘地骨三錢入蜜丸彈子用姜研十味牛黃抱龍丸治小兒傷風感冒發熱昏睡痰嗽喘急方見急驚傷食小兒傷食肚腹脹痛發熱嘔吐消導不用萬億丸方見通治太和散內用蘇陳香附山楂神麯並麥芽枳朮同甘草食物諸疾用之靈九味小兒面黃肌瘦常服焦餅最妙蓮肉茯苓麥芽山藥神麯扁豆薏苡甘草山楂等分四兩末後每曲一斤水和烙熟餅來任嚼九味瘧疾小兒瘧疾棉花根每用三分要細研攪入雞清紙封口煨熟嚼吃瘧當痊天靈散治瘧天靈火燒卻研末每五釐黃酒調下服痢疾小兒禁口痢石蓮為末細每服一二錢倉米湯調吃小兒痢疾最堪憐細茶生薑川黃連三味等分水煎服不拘新久自安然吐瀉小兒吐瀉脾胃俱傷或宜鎮固或用補良澆針丸子用黃丹硃砂枯礬棗肉丸每用針挑燈燃過米泔研服立安然四味此鎮固之藥白朮散內用人參藿香木香茯苓兼更有乾葛同甘草小兒吐瀉服之痊七味此補脾胃之劑啟脾丸用參苓朮山藥蓮肉一兩足楂陳澤草各五錢蜜丸湯化空心服九味小兒患水瀉丹礬各五錢蔥白同搗爛塗臍立安然二味咳嗽小兒咳嗽吐紅痰天花人參等分研每服五分蜜水和服後人皆道有緣蜜梨噙方真切要甜梨入蜜火煨透令兒早晚細嚼吞咳嗽痰喘如神妙喘急小兒肺脹喘嗽人人看作風喉大黃檳榔二牽牛人參分兩等勻五味研成細末蜜水調量稀稠每將一字下咽喉勝用神針法灸小兒喉中痰喘促巴豆去殼搗為丸綿裹男左女右鼻須臾痰下免憂煎盜汗小兒盜汗發潮熱柴胡胡連等分切研末蜜丸芡實大一丸水化酒少入重湯再煮二十沸待溫食後和渣啜肥瘡小兒肥瘡滿頭顱將鹽煅紅白礬枯五倍燒存性等分研末漏燈油調塗須把瘡痂先洗淨只塗三次病根除若醫禿加烏龍尾輕粉調勻也莫粗禿前羊糞湯熱洗洗時宜早不宜晡發物忌之功更效茶童從此作金呼大凡禿瘡用鮮螃蟹煎湯頻洗千金難買小兒頭瘡胎毒瘡五倍白芷各一兩花椒黃丹各五錢枯礬三錢研末放干則香油調和搽濕則只用乾摻上五味蟲痛小兒蟲積腹痛巴豆一枚去油火炒一粒研入雞子一個開頭入藥攪勻在內紙糊水煮熟收食之茶清送下打下蟲積便休發斑小兒身發斑兩足常紅腫脾經有風熱解散勿驚恐防風通聖去硝黃酒炒黃連牛蒡良研末一錢茶調服去風敗毒是奇方外洗用芩連防風薄荷先白芷黃耆柏煎湯洗自痊痘瘡小兒痘疹何以知腮赤眼胞亦赤時呵欠噴嚏及驚怖耳尖手指冰如之證作三日瘡不見升發之藥不可遲敗毒葛根堪選用解熱表汗最為宜寒涼之劑慎勿用臟腑一動致災危三日發熱三日出痘三日起脹三日貫膿三日收靨三日發熱紅點未見急宜表汗毒氣即散加味敗毒柴前胡羌獨荊防薄荷齊枳殼桔梗天麻等地骨川芎病可除十二味升麻葛根湯方見傷寒三日出痘毒氣大盛密如蠶種神功保命神功散內用參耆白芍生黃柴萆宜前胡紅花牛蒡子甘草妙劑是盧醫十味錦川經驗化毒湯紫草升麻甘草良各秤五錢加糯米黑陷不出是神方四味三日起脹頂陷不起元氣太虛保元是宜保元湯中用楝參黃耆甘草水姜煎痘瘡為主宜加減大補真元病自痊三味三日貫膿不貫是虛大補氣血自然潤肥內托散主是參耆甘草梗樸芷芎歸木香防風厚肉桂能補痘疹氣血虛十一味煎熟藥入人乳好酒同服此貫膿巧法也三日收靨灰陷黑陷白陷嘔吐表虛可見木香散內人參桂半夏前胡大腹皮訶子赤茯苓甘草陳皮丁香十一味三日收厭寒戰咬牙癢塌泄瀉裡虛可嗟異功丁香及木香茯苓人參白朮良陳皮當歸肉豆蔻厚朴附子桂生薑十二味回陽湯治痘寒虛頂陷白泡癢塌齊鹿茸酥炙須加倍附子煨熟去皮臍黃耆蜜炙當歸酒酒煎溫服可蘇危若兼咳嗽作痰喘南星加入即安之痘後餘毒聚於臟腑身熱腹痛解毒為主五福化毒丹方見諸熱治痘後餘毒如神牛蒡子飲用芩連赤芍白附子玄參羌活防風甘草入前胡連翹用水煎十一味外毒腫痛宜黑綠赤三豆酸醋浸研漿鵝翎刷患處隨手退去良治痘附後發渴如煙起紅花或用子牛蒡各等分水煎服即止出汗多不止三錢嫩黃耆當歸五錢重酸棗一錢余水煎用一服止汗有神奇泄瀉定中湯沸湯泡黃土雄黃末一錢硃砂五分數土湯加砂糖溫服瀉即止漿行作癢者內熱風寒束荊穗紙裹緊燈燒點癢處點下即放退止癢如神助痘疔最惡毒胭脂水浸濃調入雄黃末點入痘疔中收厭發熱者甘露迴天湯砂糖沸湯和一服即安康痘瘡靨已盡忽然又倒發雄黃研細末酒煎患處刷灸法治小兒痘後風男左女右手中指一稈心比三節一般長放額中與眉頭相平比至十一稈心盡處是穴艾灸三壯或五壯如神麻疹麻疹初起惡寒發熱咳嗽噴涕解表甚捷升麻葛根湯方見傷寒麻疹既出為寒又沒急須消毒慎之毋忽消毒飲內牛蒡子荊