body:
  text: 卷一歌曰雲林清隱著岐黃檃括歌中要審詳某脈某證分虛實何方何藥辨溫涼勘破玄機如中鵠勿勞岐路問亡羊醫家有此真神彀萬世蒼生慶澤長真中風屬厥陰風木脈浮滑弦數順沉細短澀逆中風口禁遲浮吉急實大數三魂脈中風不治症中風鼻鼾口張氣直面赤如妝汗綴如珠頭面貴黑痰聲拽鋸吐沫上竄搖頭髮直眼開手撒遺尿不知以上諸證不治無疑真中風因體氣虛風邪外感卒昏迷中腑中臟中血脈氣虛血虛分治之中風忽口噤卒倒昏不省先要通關竅後治風痰症搐鼻通關散皂角細辛末少許吹鼻中有嚏即可治一方用生半夏末吹之治中風痰厥不省人事並壓死縊死溺死魘死及産後暈死中風牙關緊南星末半錢龍腦入少許擦牙即能言一方用烏梅肉揉南星細辛末擦牙即開亦可中風痰氣厥巴豆紙槌油油紙捻入鼻涼氣通頂頭一方用巴豆紙槌油燒煙熏入鼻中即省痰在上者當吐之宜後方中風忽口噤痰厥不省事桐油掃喉中吐出痰為愈一方用香油加麝香一二分灌之或薑汁亦可中風痰涎盛瓜蒂一錢淨為末熟水吞吐痰如神應一方加輕粉五分水調勻灌服良久涎自出如未出含砂糖一塊下咽即吐不損人中風痰氣閉礬皂均研細二錢薑湯調稀出涎為貴中風卒痰厥辰砂白礬末三伏入豬膽陰乾用一捻涼水研化灌頃刻話能説中風卒不語牙皂蜜煎水吹些入口中能起昏沉睡痰在中者當降之用後方中風卒不省痰與火太盛靛缸水一鍾溫服可救命中風痰氣響古石灰半兩研末入水煎服之痰下降中風中寒中暑中濕卒中卒倒痰厥氣厥攝生飲內細辛蒼半夏南星與木香甘草菖蒲薑七片風痰氣厥總安康七味中風不語痰迷心竅痰火氣鬱豁開為妙加味導痰二陳湯參朮芩連歸木香枳梗南星瓜蔞子中風痰火最為良十四味中風氣虛痰氣厥絶口噤不省溫藥急啜三生飲內用南星川烏附子木香並薑十片煎通口服中風痰厥最為靈四味中風頑麻骨節疼痛風濕氣鬱用藥疏通烏藥順氣陳皮薑枳殼殭蠶芎芷詳甘草麻黃桔梗入中風先服最為良十味風邪中腑者手足拘攣急脈浮惡風寒解表病當失疏風湯內二陳宜芎芷羌防辛桂枝香附當歸土烏藥表後還當調理之十三味風邪中臟者多滯於九竅脈沉二便閉通里治之妙滋潤湯歸生地黃枳殼厚朴及檳榔羌活杏仁天麻子再入紅花與大黃十味風中血脈者肢廢不能言外無六經症內無便溺愆養榮湯內羌防風二陳四物麥門冬遠志菖蒲連枳實南星秦艽烏藥同十八味風中經絡者口與眼喎斜治當清痰火鱔血塗之佳清痰順氣星半陳荊防芩連瓜蔞仁蒼朮貝母草官桂沉木香末服之神十二味白龍膏方見後余方治口眼喎斜殊效風中左癱者血虛與死血養血活血治祛風痰火徹加減潤燥桂天麻二陳四物酒紅花省風白朮牛酸棗生地羌活柏皮佳二十味省風湯即南星半夏防風黃芩甘草是也健步虎潛丸方見後余方治癱瘓殊效風中右瘓者氣虛與濕痰筋骨痠疼痛除濕祛風寒祛風除濕四君先二陳芎歸芍芩連枳桔羌防土烏藥蒼朮白芷水薑煎十八味風邪中左右手足皆癱瘓血氣兩空虛補養功不緩加減大補十全湯附子羌活沉木香牛膝杜仲並薏苡烏藥獨活木瓜良二十一味十全大補湯方見諸虛依本方加上十二味邵真人追風換骨丹方見後雜方治真中風邪一切百病中風實熱症舌強驚譫語發狂二便難解表又通里防風通聖將軍芍薄荷芎歸草芒硝梔翹芩梗並白朮麻黃荊芥滑石膏十七味類中風類中風者常有之寒暑濕火氣食隨勞房痰血卒中惡十一般類要君知中寒脈浮緊冬月中寒氣昏冒口牙噤肢攣惡寒是附子理中薑桂枝參歸術草朴陳皮棗子生薑煎熱服回陽返本建功奇十味中暑則脈虛夏月卒中之昏冒痿厥極吐瀉喘滿隨十味香茹參朮耆木瓜扁豆茯陳皮薑炒厚朴並甘草再加羌活暑風宜中濕脈微細東南多有之多由濕生痰痰熱生風氣清燥湯方見痿躄中火心火盛水衰熱氣並昏冒卒多僕六味四君應六味地黃丸四君子湯二方俱見諸虛中氣脈必沉七情之過極氣厥多昏冒牙關必緊急藿香正氣散方見霍亂治中氣中惡有殊功木香順氣散烏藥香附砂仁川厚朴枳半薑桂青腹皮甘草木香末調藥十二味食厥因傷食過多損胃氣不能運化時昏冒致如是六君子湯參朮苓陳皮半夏縮砂仁木香香附並甘草薑棗煎服效如神九味勞傷過於勞耗損真元氣脾胃兩虛衰昏冒不知事補中益氣湯方見內傷房勞因過度腎虛精耗去真氣不歸元昏冒作虛視六味地黃丸方見諸虛痰厥因內虛痰氣忽阻滯手足厥冷麻暈倒脈沉細加味二陳加當歸枳實桔梗杏仁隨良薑砂仁木香桂痰厥暈倒可扶持十二味血暈去血多血虛成血暈脈來微且澀氣血虛之甚加味四物加生黃參朮黃耆蜜炒香茯苓陳皮荊芥穗甘草烏梅一個良十三味卒中暴卒者不省人事也因犯不正氣厥冷麵如酒藿香正氣散方見霍亂調氣散中白豆蔻丁香木香檀香料砂仁甘草與藿香為末二錢鹽點妙七味余方附後健步虎潛生熟地牛膝杜仲破故紙白朮芍藥虎脛骨麥志知柏二兩是枸杞黃耆敗龜板當歸一兩半去尾茯苓人參酸棗仁木瓜石菖蒲薏苡羌活獨活與防風各稱一兩要心記沉附五味各五錢豬髓蜜丸酒下咽不問癱瘓半身枯語言蹇澀皆能治二十八味白龍膏治口喎斜蒼朮川芎二兩加血竭乳香並沒藥參歸芎芷白花蛇荊防薄細麻甘桔草烏何首及天麻兩尖石斛五錢等蜜丸彈大嚼君茶二十二味消風敗毒散諸風參茯荊防藿朴芎蟬蠶陳草並羌活二錢末藥酒調中十二味胡麻散治諸風毒皮膚瘙癢頑麻木苦荊威靈何首甘研末二錢薄湯服六味冷風疙瘩發瘙癢荊防芎芷茯陳歸何首烏藥蠶蟬草羌活蒼朮等分宜十四味兩手搖動雞爪風羌活威靈首烏同防己蒼朮白附子鉤藤甘草汗收功九味搜風順氣丸大黃酒蒸九次五兩強火麻郁李菟山藥牛膝石棗與檳榔各稱二兩宜精製獨活枳殼一兩良二兩半炒車前子蜜丸茶酒任君嘗能醫七十二般氣三十六種風妙方十一味傷寒附傷風傷寒熱病宜洪大忌沉細主有變凡傷寒脈浮滑洪數陽脈為順沉細微弱陰脈為逆傷寒惡寒卻無汗寒脈緊澀真可斷傷鳳惡風有汗出風脈來兮多微緩十神湯內紫蘇多甘草陳皮香附顆乾葛升麻並芍藥川芎白芷麻黃和十味升麻葛根甘白芍四味均勻水煎卻頭疼發熱及惡寒時行瘟疫香蘇佐四味人參敗毒散桔梗甘草川芎茯苓等枳殼前胡羌獨活柴胡十味性涼冷十味傷寒脈浮者無汗腰脊強發熱頭項痛此病在太陽無汗惡寒此傷寒在表春夏秋月宜羌活湯羌活湯中蒼朮辛川芎白芷地黃芩更有防風甘草等薑蔥煎服有神靈九味無汗惡寒此傷寒在裡冬月宜麻黃湯麻黃湯中用桂枝杏仁甘草四般宜再加芎芷並羌活升麻防風發汗奇九味有汗惡風此傷風在表春夏秋月宜羌活沖和湯羌活沖和湯即羌活湯去蒼朮加白朮黃耆十味有汗惡風此傷風在表冬月宜桂枝湯桂枝湯內藥三般芍藥甘草一處攢羌活川芎與白朮四味加入病當安七味傷寒脈長者鼻乾眼眶疼身熱不得臥此病在陽明若渴而有汗不解或經汗過不解宜白虎湯黃帝素問白虎湯甘草知母與石膏人參亦有加之用熱渴虛煩用米熬四味傷寒脈弦者耳聾胸脅痛寒熱嘔口苦此是少陽症小柴胡湯只五般半夏人參一處攢更有黃芩與甘草生薑棗子水煎湯五味傷寒脈沉細腹滿而作痛咽乾手足溫此是太陰症桂枝大黃湯柴胡芍藥藏枳實並甘草棗子共生薑傷寒不惡寒而反惡熱者表證尚未除里證又急也大柴胡湯用大黃半夏枳實最為良更有黃芩赤芍藥薑棗煎來利大腸六味傷寒躁渴急狂妄作譫語便實陽作陰熱邪傳入里六一順氣柴芩芍大黃芒硝並厚朴枳實甘草水煎湯清熱利便通神藥八味傷寒汗吐下煩躁口渴者表裡大熱證解毒致奔焦黃連解毒湯四味黃柏黃芩梔子是退黃解熱又除煩吐血便紅諸熱治四味傷寒陽毒深發黃身似金妝此欲亂走清涼可起沉三黃石膏湯梔子與麻黃細茶薑豆豉九味共煎嘗傷寒血分熱裡實而表虛皮膚髮斑疹黑斑不可醫消癍青黛飲玄參知母石膏生黃連柴胡梔子烏犀角甘草人參薑棗煎十一味傷寒小便利口燥大便黑漱水不肯咽下焦瘀血隔桃仁承氣五般奇甘草硝黃並桂枝加入青皮白芍藥柴胡枳實並當歸十傷寒結胸膈痞悶不通泰多是熱與痰清除即通快清火化痰芩連梔二陳蔞貝杏桑皮枳桔朴硝並蘇子木香研入最為奇十六味傷寒汗下後煩熱津液枯發熱氣逆吐表與里俱虛竹葉石膏湯用參麥門半夏更加臨甘草生薑兼用米虛寒自利熱家尋傷寒大病後晝夜不得眠心膽皆虛怯溫膽即安然溫膽湯半陳芩草竹茹枳實加酸棗人參遠志熟地黃五味同煎虛煩好十味傷寒懊憹者悶郁不舒暢反復多顛倒梔豉可瘳恙梔子治肺煩豆豉醫腎燥梔豉共煎嘗懊憹一齊好傷寒百合病百沒是處者非熱又非寒形容不盡也加味柴胡加知母百合竹茹一處煮炒米食鹽薑與些一服教君不受苦八味傷寒痰與氣緊滿在胸臆上不得喘息吐之立可愈瓜帝赤小豆等分為末候豉湯調一錢以吐痰為妙傷寒昏不語熱邪傳心肺名為越經症莫將針灸治瀉心導赤烏犀角人參茯苓知母銼芩連梔子麥門冬滑石甘草為使佐十味傷寒陽似陰火極似水列自熱以至溫由溫乃至厥此是傳經邪不可用溫熱宜四逆散合小柴胡湯如渴用白虎湯重則六一順氣湯四逆散內用柴胡芍藥枳實甘草扶生薑一片水煎服手足厥冷立時蘇四味傷寒陰似陽水極似火象自病手足冷莫把寒涼喪傷寒狐與惑唇瘡聲啞得食下部曰狐食其臟為惑黃連犀角共煎湯烏梅桃仁與木香不問傷寒狐惑病須知一藥即安康五味傷寒吐蛔蟲手足多厥冷胃氣一虛寒蛔蟲因作梗理中安蛔用花椒參朮乾薑要炒焦茯苓烏梅止二個服後柴胡湯退潮六味傷寒汗下後人事昏不省熱渴發狂言元氣大虛症奪命獨參湯一兩水煎嘗諸虛危急症服下立安康病後一勞復多因氣血虛微微復發熱清補是良醫益氣養神參茯神麥冬歸芍炒梔仁前胡知母陳升草十一味藥效通靈傷寒新差後交接因復發欲死眼不開一話不能説清郁山梔子算來三十枚銼碎水煎服能令性命回勞力復感冒內傷外感病熱汗身頭痛沉困無力應加味益氣湯參耆陳皮白朮草當歸柴胡升麻炒黃柏羌活防風不用疑十一味余方附後小靈丹丸治傷寒不論表裡陰陽虛實傳變經絡服之鼻準微汗其疾自愈余昔在京師世宗時興大工百工感其疾死者莫計其數後以此藥救之蒙活者甚重人成以神稱之故名曰小靈丹也甘草麻黃四兩分硃砂雄黃一兩均芍藥用赤獨二兩升麻柴胡各一參春夏滑石及枳實秋冬桂枝與細辛四味各來五錢準須擇甲子與庚申上各為極細末各味用杏仁少許擂羅澄粉陰乾各稱分兩醋糊為丸如緑豆大每服三丸以雄黃末三分和井水吞下中寒屬太陽寒水脈滑實手足溫者順虛結手足寒者逆中寒無頭痛怕寒手足冷寒中三陰經回陽藥要猛凡中寒卒倒昏迷不省者先用熱酒薑汁各半盞灌服稍醒後進湯藥救之回陽急救乾薑桂參朮茯苓遼五味陳皮半夏大附子甘草生薑同一類十味寒中太陰經中脘作疼痛嘔瀉不作渴理中湯可送理中甘草及乾薑白朮人參是本鄉若是內中加附子更名附子理中湯四味寒中少陰經臍腹作疼痛惡寒頭及疼五積立可中五積白芷陳皮朴桔梗枳殼川芎芍甘草茯苓蒼朮歸半夏薑桂麻黃著十五味寒中厥陰經小腹至陰痛四肢厥冷極熱藥急須用四逆湯中大附子一枚生用去皮研更有甘草六錢炙乾薑五錢生用之三味灸中寒陰症法氣海穴在臍下一寸五分丹田在臍下二寸關元在臍下三寸用艾火灸二七壯但手足溫暖臍脈至知人事無汗要有汗即生不暖不省者死瘟疫衆人病一般是天行時疫腫項大頭瘟症總屬風熱人參敗毒散治四時瘟疫通用方見傷寒神效二聖救苦丸大黃四兩酒蒸研牙皂二兩糊丸子緑豆冷湯送二錢人間治疫有仙方一兩殭蠶二大黃薑汁為丸如彈子井花和蜜即清涼牛蒡芩連用大黃玄參桔梗並羌防荊芥石膏甘草入連翹敗毒免災殃十二味防風通聖散方見中風治時行瘟疫熱病八聖散治大頭瘟連芩蒲柏五錢存雞內金與蛇蛻炒白丁雄黃二錢勻為末每服一錢重藍靛根湯送下吞凡入瘟疫家雄黃塗鼻孔多食燒酒蒜出門打涕噴以紙條深入鼻則自然有涕噴中暑暑者熱也屬少陰君火脈虛身熱得之傷暑中暑身煩熱四肢沉困倦此熱傷元氣體虛多自汗清暑歸耆二術參麥門五味橘甘升葛根神麯並黃柏澤瀉青皮亦可臻十五味中暑口乾燥或吐或瀉時暑風或昏冒香薷加減醫香薷散內藥三般厚朴相參扁豆攢加上黃連為絶妙和中祛暑最能安暑風因暑熱客於胸膈之間痰鬱昏冒如醉用黃連香薷散加防風木香南星薑水煎磨化抱龍丸服中暑作熱渴水便閉澀黃和中清下部暑病一奇方清暑一元散滑石用六錢一錢甘草末水調服下痊中暑煩熱渴大便泄瀉溏小便赤澀少宜分利陰陽五苓散內用豬苓白朮茯苓澤瀉停肉桂用之多與少白水煎來止渴行五味注夏之症者夏初春末時煩渴沉困倦元氣血皆虛參歸益元芍地黃麥冬五味茯苓詳知母黃柏陳皮草炒米烏梅棗一雙十一味行人千里水葫蘆硼砂薄荷白糖殊柿霜烏梅搗丸子噙化一丸省用沽五味中濕屬太陰濕土脈多沉細脈浮而緩濕在表也脈沉而緩濕在裡也或弦而緩或緩而浮皆風濕相傳也中濕一身痛風濕邪在表風藥能勝濕醫者當分曉除濕羌活用防風升麻柴胡藁本同蒼朮米泔浸製過水煎服後見奇功六味中濕腹脹滿濕邪傳在裡治宜分利走滲濕而已矣滲濕湯中蒼白朮陳皮香附撫川芎豬苓澤瀉砂仁草茯苓厚朴有奇功十一味中濕成偏枯四肢作冷痹腎氣一空虛手足難動履獨活寄生湯桑寄秦艽細辛杜仲參牛膝防風苓桂草四物湯加薑棗煎十五味濕氣偏身作腫痛茅山蒼朮一斤重米泔童便各浸半酒丸七十黃酒送火證屬少陽相火脈浮而洪數為虛火沉而實大為實火脈洪實滑為順微細虛弱為逆三焦若火盛脈沉而實大內外皆積熱便赤口瘡潰黃連解毒芩柏梔連翹芍藥緊相隨更有柴胡各等分水煎食後服相宜七味涼膈連翹梔子仁大黃甘草朴硝芩竹葉薄荷加蜜煮諸般積熱效如神八味心經若火盛左寸脈洪數舌上必生瘡腫硬痛乾涸黃連湯內芍當歸麥門生地草山梔犀角薄荷同水煮食後須教頻服之九味肝經若火盛左關脈洪數脅痛木氣實目紅腫痛著柴胡湯內芍川芎當歸青皮梔子同甘草連翹龍膽草水煎食後服收功九味肺經若火盛右寸脈洪數嗽血鼻瘡腫喉痛如火烙黃芩湯內桔山梔荊芥薄荷桑白皮連翹麥門冬芍藥甘草同煎功效隨十味脾經若火盛右關脈洪數煩渴口燥干唇上生瘡惡芍藥湯內用石膏梔子薄荷與連翹更有黃連甘草等管教服後病皆消七味內傷脈洪大而虛內傷勞役傷元氣或兼飲食損脾胃熱渴汗喘脈虛洪四肢沉困身無力補中益氣黃耆參陳皮白朮當歸兼柴胡升麻甘草伴形勞虛損喘皆痊八味勞役傷飲食腹脅悶短氣遇夏熱猶寒春來口無味升陽順氣湯參耆當歸半夏廣陳皮神麯升麻草豆蔻黃柏甘草也堪題十一味肺與脾胃虛怠墮食無味淅淅惡於寒慘慘不樂意升陽益胃參朮耆黃連半茯草陳皮澤瀉防風羌獨活柴胡白芍總相宜十四味凡遇勞役過辛苦用力多急須補元氣免致內傷疴補氣湯內蜜黃耆人參白朮與陳皮麥門五味並甘草薑棗同煎大補虛七味凡遇勞心事思慮損精神頭眩目昏暗虛煩要補心補血湯內芎芍歸人參生地草山梔麥門酸棗五味子茯神去木與陳皮十二味食後多沉困看來脾胃虛元氣亦虧損補養是良規參耆湯內用當歸升麻柴胡與青皮蒼朮神麯炒黃柏甘草煎服不須疑十味補氣養血和脾理胃清火化痰開鬱順氣養精壯神助力生肌最能當勞可以耐飢人生日用不可無之雲林神妙潤身丸白朮當歸六兩先茯陳楂曲連香附各稱三兩勿教偏參藥枳蓮芍二兩五錢甘草炙同研荷葉煮飯丸梧大米湯百粒不拘吞十四味生脈散補真元氣大能止渴生津液人參五味麥門冬再加白朮和脾胃四味傷食氣口脈多緊盛飲食過多脾胃傷傷食夾氣感寒涼肚腹脹痛發寒熱消食發表順氣良行氣香蘇散祕傳陳皮烏藥枳羌先蒼芎麻草同煎服內傷外感服之痊十味飲食多停滯痞脹痛難當便難凝熱積消導即安康枳實大黃湯厚朴檳榔甘草同煎著腹痛甚者加木香一劑教君即安樂五味消滯丸子黑牽牛炒來為末二兩頭香附五靈各一兩醋糊為丸病自瘳三味飲食冷停積寒涼傷太陰嘔噦腹痞痛消散病難侵香砂養胃蒼白陳參苓厚朴白蔻仁更有木香甘草炙薑棗同煎效若神十味人若不思食食後返倒飽此是脾氣虛安胃自然好香砂六君參朮苓半夏陳皮益智仁甘草木香白豆蔻厚朴薑炒極溫平十二味飲食自倍脾胃乃傷溫平胃氣始得安康香砂平胃蒼朮陳甘草枳實木香真更有藿香薑一片敢教胃氣得和平八味酒性有熱毒氣與味俱陽太過損元氣節飲壯神光葛花解酲白蔻仁參朮青陳砂茯苓澤瀉豬苓神麯炒生薑干與木香並十三味酒食被人勸飲多胸腹脹痛怎奈何鹽花擦牙水漱咽如湯沃雪笑呵呵郁證脈多沉伏郁者鬱結名有六氣血痰濕熱並食結聚其中不發越須要分別六郁治六郁湯中炒神麯蒼芎蘇枳陳香附連翹貝母炒山梔茯苓甘草為佐助十二味七情氣鬱症腹脅脹滿痛胸臆不通和六脈多沉重木香調氣烏附桂枳朴蒼砂青陳皮撫芎甘草各等分水磨木香同服之十二味血鬱脈數澀能食便出紅或暴吐紫血其痛不移通當歸活血芎桂芍桃仁紅花烏枳殼乾薑香附牡丹皮甘草青皮等分銼十三味食鬱噯酸氣胸腹飽悶滯不食仍作痛右關脈緊是香砂平胃加枳殼山楂麥芽神麯銼乾薑炒黑磨木香十二味內要斟酌痰鬱脈沉滑重則氣喘急或者胸脅痛痰咳嗽不出瓜蔞枳實片黃芩桔芎朮附杏砂陳貝母木香甘草入生薑竹瀝服加臨十三味熱鬱即火鬱小便黃赤澀五心煩熱躁脈數舌乾裂火鬱湯內用山梔乾葛柴胡地骨皮連翹撫芎白芍藥甘草煎來郁可舒八味濕鬱脈沉細發時遇陰雨周身骨節間走注疼痛是滲濕湯方見中濕諸般鬱結扶脾理胃消積散熱開鬱行氣越鞠保和丸曲梔蒼芎附半茯陳皮枳連當歸各一兩白朮三兩去蘆枝翹蘿木香五錢入山楂三兩共研為薑汁蒸餅丸梧子七十薑湯任服之十六味痰飲脈多滑有弦滑沉滑微滑又云諸病痰盛脈難定擬火痰黑色老痰膠濕痰白色寒痰清遍身上下無不到變化百病卒難明二陳湯中半夏宜茯苓甘草並陳皮化痰燥濕和脾胃百病兼痰總可醫四味痰氣塞心竅迷悶昏沉睡此是七情傷挾痰加鬼祟清熱導痰湯半星芩連枳朮草參茯陳皮桔梗瓜蔞子痰迷心竅立時醒十二味痰燥作煩躁痰話錯言語痰迷悲歌叫狂走忽驚惕加減溫膽白茯神參朮陳半酸棗仁枳連歸草山梔子竹茹辰砂麥門尋十四味千般怪異症多兼痰與火果屬實熱痰一服如開鎖滾痰丸甑里翻身甲卦金於今頭帶草堂深相逢二八求斤稱硝煅青礞倍若沉十七兩中令半兩水丸梧子意常斟千般怪症如神效水瀉隻身卻不任治病列後中風不語痰涎壅塞溫水研化灌下明白遍身筋骨走注疼痛不能明狀此藥可用噎膈反胃吞酸噯氣嘔吐痰涎無所不治心下怔忡如畏人捕怵惕不安陰陽隔阻失心喪志或癲或狂或驚或痛或作健忘痰涎咳嗽喘急上壅頭目眩暈氣塞胸中急慢喉閉腮頷腫瘍繞項結核咽喉痛瘡心氣冷痛如停水塊上攻頭面或走四大痢疾新久不問雜色或帶血塊惡物下迫一切諸疾醫所不識加減用之萬無一失咳嗽脈宜浮大不宜沉小又云脈浮軟為順沉伏為逆若久嗽形脫身熱不除脈細急者死春是上升之氣夏是火災最重秋是濕熱傷肺冬是風寒外束四時感風寒發熱喘嗽痰寬中快胸膈涕唾吐稠黏參蘇飲內用陳皮桔梗前胡半夏宜乾葛茯苓同甘草木香枳殼總堪題十一味上焦肺火盛咳嗽吐痰涎清金降邪火投之病自痊清肺湯中用片芩天麥五味杏桑陳歸苓甘草山梔子桔梗貝母用之靈十三味上焦虛火盛咳嗽熱痰喘日輕夜稍重一服病自減潤肺豁痰寧嗽湯二陳知母熟地黃天麥當歸桔貝母黃芩紫菀款花良十二味過傷酒食胃火上炎沖逼肺氣痰嗽經旬二母寧嗽山梔仁黃芩石膏白茯苓桑皮瓜蔞五味子甘草陳皮枳實並十二味清上寧嗽噙化丸天門海石橘紅先瓜蔞柿霜芩酒炒各稱一兩勿加添梗翹玄黛五錢等三錢風化朴硝研為末蜜丸龍眼大一丸噙化妙通玄十一味新久咳嗽諸治不已用此仙方沉疴頓起洞賓仙傳蘆吸散嫩蕊冬花稱五錢鵝管石用二錢半陳皮甘草亦如然虛加人參五分足寒將肉桂一錢添研末為丸分七帖每用一帖夜臨眠藥作三次入竹管口吸溫水送下咽油膩鹽須忌七日一夜一次嗽當痊多年久咳嗽先嚼啞芙蓉只用一分許後即服神功久年咳嗽用神功枸杞蓯蓉及款冬各稱一兩分四劑苦參減半水煎同四味分四劑水煎服次用煙筒散熏之連熏五六次良愈煙筒一兩款冬花鬱金六錢炒莫差木香三錢雄黃一研末紙卷作煙霞熏入病人喉管內人參桔梗湯送佳治男婦遠近咳嗽方一兩香油二兩蜜三兩生薑自然汁各照等分稱記定慢火煎熬似黑漆五更滾水服一匙千年咳嗽無蹤迹若人誠心肯服之除根去苗如刀利喘急脈滑而手足溫者生脈沉澀而四肢寒者死火動若發喘乍進復乍退得食下則減食止喘加倍清肺湯中白茯苓麥門桑杏枳蘇陳片芩貝母山梔子沉香辰砂服加臨十二味氣短作喘急呼吸氣短促又且無痰聲元氣須補續四君湯內參術苓陳皮厚朴與砂仁沉木另研歸蘇子桑皮甘草可相尋十二味陰虛火動喘心部脈必數白日病猶輕夜間稍重著滋陰降火湯方見虛勞依本方加蘇子沉香杏仁桑白皮竹瀝寒喘四肢冷六脈多沉細治之宜理中喘急自定矣理中湯內桂乾薑厚朴陳皮沉木香砂仁蘇子甘草炙或加附子可回陽傷寒發喘急發表定良方若還有痰氣加入二陳湯五虎湯內用麻黃杏仁甘草石膏藏更入細茶同水煮桑皮加入又為良五味虛陽上攻喘氣急不升降上盛下元虛痰嗽喘促上蘇子降氣湯半夏甘草前胡肉桂咀當歸厚朴陳皮等薑棗同煎痰喘舒八味哮吼哮吼即齁喘肺竅積寒痰有至終身者仙方可拔根五虎二陳用麻黃陳半參苓膏杏藏沉香木香細茶葉薑蔥煎服喘安康十味哮吼湯中半芩連瓜蔞枳桔杏膏先麻黃紫蘇及甘草生薑茶葉水同煎十一味諸病原來有藥方惟愁齁喘最難當麻黃桑杏尋蘇子白果冬花更又良甘草黃芩同半夏水煎百沸不須薑病人遇此仙丹藥服後方知定喘湯九味紫金丹治久哮吼一錢生信三枯礬淡豉一兩蒸搗爛入藥同研如豆丸但覺舉發冷茶下七丸妙藥似神仙和劑須投定喘湯阿膠半夏及麻黃人參四兩同甘草四兩桑皮五味強罌粟二錢須蜜炙三錢煎服用生薑多年氣喘從今愈始信良醫有妙方八味灸哮吼神法患者耳前兩邊名郁中二穴百會一穴用艾七壯灸之立已
